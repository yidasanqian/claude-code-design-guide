<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" font-family="Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0,10 3,0 6" fill="#666"/>
    </marker>
  </defs>
  <rect width="700" height="320" fill="white"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e40af">System Prompt Assembly</text>

  <!-- Layer 1 -->
  <rect x="160" y="50" width="380" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="350" y="68" text-anchor="middle" font-size="13" fill="#1e40af">getCLISyspromptPrefix()</text>
  <text x="350" y="83" text-anchor="middle" font-size="11" fill="#6b7280">CLI System Prompt Prefix</text>

  <!-- Plus sign + arrow -->
  <text x="350" y="108" text-anchor="middle" font-size="18" fill="#9ca3af">+</text>
  <line x1="350" y1="115" x2="350" y2="125" stroke="#666" stroke-width="1"/>

  <!-- Layer 2 -->
  <rect x="160" y="125" width="380" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="350" y="143" text-anchor="middle" font-size="13" fill="#1e40af">customSystemPrompt</text>
  <text x="350" y="158" text-anchor="middle" font-size="11" fill="#6b7280">Custom System Prompt (replaces default if provided)</text>

  <text x="350" y="183" text-anchor="middle" font-size="18" fill="#9ca3af">+</text>
  <line x1="350" y1="190" x2="350" y2="200" stroke="#666" stroke-width="1"/>

  <!-- Layer 3 -->
  <rect x="160" y="200" width="380" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="350" y="218" text-anchor="middle" font-size="13" fill="#1e40af">appendSystemPrompt</text>
  <text x="350" y="233" text-anchor="middle" font-size="11" fill="#6b7280">Append System Prompt</text>

  <text x="350" y="258" text-anchor="middle" font-size="18" fill="#9ca3af">+</text>
  <line x1="350" y1="265" x2="350" y2="275" stroke="#666" stroke-width="1"/>

  <!-- Layer 4 + 5 side by side -->
  <rect x="80" y="275" width="240" height="35" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="200" y="292" text-anchor="middle" font-size="12" fill="#1e40af">prependUserContext()</text>
  <text x="200" y="305" text-anchor="middle" font-size="11" fill="#6b7280">Prepend User Context</text>

  <text x="350" y="295" text-anchor="middle" font-size="18" fill="#9ca3af">+</text>

  <rect x="380" y="275" width="240" height="35" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="500" y="292" text-anchor="middle" font-size="12" fill="#1e40af">appendSystemContext()</text>
  <text x="500" y="305" text-anchor="middle" font-size="11" fill="#6b7280">Append System Context</text>

  <!-- Final assembled arrow from layer 3 splits to both -->
  <line x1="200" y1="265" x2="200" y2="275" stroke="#666" stroke-width="1"/>
  <line x1="500" y1="265" x2="500" y2="275" stroke="#666" stroke-width="1"/>
</svg>
