<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 700">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <text x="375" y="25" font-family="Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle" font-weight="bold">백그라운드 서비스 오케스트레이션</text>

  <rect x="225" y="50" width="300" height="50" fill="#dbeafe" stroke="#2563eb" stroke-width="3" rx="5"/>
  <text x="375" y="75" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">handleStopHooks()</text>
  <text x="375" y="92" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">[메인 스레드, 블로킹]</text>

  <rect x="225" y="130" width="300" height="60" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="375" y="152" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">1. executeStopHooks()</text>
  <text x="375" y="168" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">사용자 설정 Stop 훅</text>
  <text x="375" y="183" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">blockingErrors / preventContinuation</text>

  <rect x="225" y="220" width="300" height="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="375" y="245" font-family="Arial,sans-serif" font-size="12" fill="#78350f" text-anchor="middle" font-weight="bold">2. 백그라운드 병렬 실행 (fire-and-forget)</text>

  <rect x="50" y="290" width="160" height="80" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="130" y="310" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">executeExtractMemories()</text>
  <text x="130" y="328" font-family="Arial,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">• 게이트: tengu_passport_quail</text>
  <text x="130" y="343" font-family="Arial,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">• 스로틀: N 턴마다</text>
  <text x="130" y="358" font-family="Arial,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">• 뮤텍스: 기본이 기록 시 건너뜀</text>

  <rect x="230" y="290" width="160" height="80" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="310" y="310" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">executePromptSuggestion()</text>
  <text x="310" y="328" font-family="Arial,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">• 게이트: env + GrowthBook</text>
  <text x="310" y="343" font-family="Arial,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">• 조건: 어시스턴트 턴 ≥2</text>
  <text x="310" y="358" font-family="Arial,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">• 필터: 메타 텍스트 제거</text>

  <rect x="410" y="290" width="160" height="80" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="490" y="310" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">executeAutoDream()</text>
  <text x="490" y="328" font-family="Arial,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">• 시간 게이트: ≥24시간</text>
  <text x="490" y="343" font-family="Arial,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">• 세션 게이트: ≥5 세션</text>
  <text x="490" y="358" font-family="Arial,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">• 4단계: Orient → Prune</text>

  <rect x="590" y="290" width="140" height="80" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="660" y="310" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">cleanupComputerUse</text>
  <text x="660" y="325" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">AfterTurn()</text>
  <text x="660" y="343" font-family="Arial,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">• 앱 자동 표시</text>
  <text x="660" y="358" font-family="Arial,sans-serif" font-size="9" fill="#64748b" text-anchor="middle">• Esc 단축키 해제</text>

  <rect x="225" y="400" width="300" height="40" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="5"/>
  <text x="375" y="425" font-family="Arial,sans-serif" font-size="12" fill="#14532d" text-anchor="middle" font-weight="bold">3. 기타 조건부 백그라운드 서비스</text>

  <rect x="50" y="470" width="160" height="40" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="3"/>
  <text x="130" y="495" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">템플릿 작업 분류</text>

  <rect x="230" y="470" width="160" height="40" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="3"/>
  <text x="310" y="490" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">AgentSummary</text>
  <text x="310" y="503" font-family="Arial,sans-serif" font-size="9" fill="#475569" text-anchor="middle">(코디네이터, 30초 간격)</text>

  <rect x="410" y="470" width="160" height="40" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="3"/>
  <text x="490" y="490" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">SessionMemory</text>
  <text x="490" y="503" font-family="Arial,sans-serif" font-size="9" fill="#475569" text-anchor="middle">(토큰 임계값 트리거)</text>

  <rect x="590" y="470" width="140" height="40" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="3"/>
  <text x="660" y="490" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">MagicDocs</text>
  <text x="660" y="503" font-family="Arial,sans-serif" font-size="9" fill="#475569" text-anchor="middle">(유휴 턴)</text>

  <rect x="140" y="540" width="160" height="40" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="3"/>
  <text x="220" y="560" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">TeammateIdle +</text>
  <text x="220" y="573" font-family="Arial,sans-serif" font-size="9" fill="#475569" text-anchor="middle">TaskCompleted 훅</text>

  <rect x="320" y="540" width="160" height="40" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="3"/>
  <text x="400" y="560" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">settingsSync 업로드</text>
  <text x="400" y="573" font-family="Arial,sans-serif" font-size="9" fill="#475569" text-anchor="middle">(대화형 CLI)</text>

  <line x1="375" y1="100" x2="375" y2="130" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="190" x2="375" y2="220" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <line x1="375" y1="260" x2="130" y2="290" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="260" x2="310" y2="290" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="260" x2="490" y2="290" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="260" x2="660" y2="290" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <line x1="375" y1="370" x2="375" y2="400" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <line x1="375" y1="440" x2="130" y2="470" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="440" x2="310" y2="470" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="440" x2="490" y2="470" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="440" x2="660" y2="470" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="440" x2="220" y2="540" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="440" x2="400" y2="540" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="50" y="620" width="650" height="60" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="60" y="640" font-family="Arial,sans-serif" font-size="11" fill="#78350f" font-weight="bold">참고:</text>
  <text x="60" y="655" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• 반복 작업은 7일 후 자동 만료 (마지막으로 한 번 실행 후 삭제)</text>
  <text x="60" y="670" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• 모든 백그라운드 서비스는 fire-and-forget (비블로킹)</text>
</svg>
