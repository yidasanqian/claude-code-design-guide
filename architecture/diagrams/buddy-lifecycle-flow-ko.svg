<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
  </defs>

  <!-- Start -->
  <rect x="150" y="20" width="200" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="250" y="45" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" text-anchor="middle">신규 사용자 첫 로드</text>

  <!-- hashString -->
  <line x1="250" y1="60" x2="250" y2="90" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="120" y="90" width="260" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="250" y="115" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" text-anchor="middle">hashString(userId) → seed</text>

  <!-- mulberry32 -->
  <line x1="250" y1="130" x2="250" y2="160" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="120" y="160" width="260" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="250" y="185" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" text-anchor="middle">mulberry32(seed) → rng</text>

  <!-- roll -->
  <line x1="250" y1="200" x2="250" y2="230" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="100" y="230" width="300" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="250" y="255" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" text-anchor="middle">roll() → CompanionBones</text>

  <!-- Check Soul -->
  <line x1="250" y1="270" x2="250" y2="300" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="100" y="300" width="300" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="250" y="320" font-family="Arial,sans-serif" fill="#1e40af" font-size="11" text-anchor="middle">로컬 스토리지 확인: Soul 존재?</text>
  <text x="250" y="340" font-family="Arial,sans-serif" fill="#666" font-size="10" text-anchor="middle">예 → Soul 로드  |  아니오 → 새 Soul 생성</text>

  <!-- Companion -->
  <line x1="250" y1="350" x2="250" y2="380" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="100" y="380" width="300" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="250" y="405" font-family="Arial,sans-serif" fill="#1e40af" font-size="13" font-weight="bold" text-anchor="middle">동반자 (완전한 캐릭터)</text>

  <!-- Usage -->
  <line x1="250" y1="420" x2="250" y2="450" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="80" y="450" width="340" height="120" fill="#e0f2fe" stroke="#2563eb" stroke-width="1" rx="5"/>
  <text x="90" y="475" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">• CompanionSprite.tsx (렌더링)</text>
  <text x="90" y="500" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">• useBuddyNotification (알림)</text>
  <text x="90" y="525" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">• prompt.ts (LLM 퍼스널리티 주입)</text>
</svg>
