<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440" width="640" height="440">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="320" y="28" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#1e40af" text-anchor="middle">Command vs Tool Flow</text>

  <!-- Left column header: Command path -->
  <rect x="30" y="48" width="265" height="36" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="162" y="72" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">Command Path (User-Initiated)</text>

  <!-- Right column header: Tool path -->
  <rect x="345" y="48" width="265" height="36" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="477" y="72" font-family="Arial,sans-serif" font-size="13" fill="#92400e" text-anchor="middle" font-weight="bold">Tool Path (Model-Selected)</text>

  <!-- Left: User direct input -->
  <rect x="50" y="108" width="225" height="40" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="162" y="125" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="bold">User types /command</text>
  <text x="162" y="141" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">(explicit user intent)</text>

  <!-- Right: Model reasoning -->
  <rect x="365" y="108" width="225" height="40" rx="5" fill="#f0f4f8" stroke="#f59e0b" stroke-width="2"/>
  <text x="477" y="125" font-family="Arial,sans-serif" font-size="12" fill="#92400e" text-anchor="middle" font-weight="bold">Model reasoning selects tool</text>
  <text x="477" y="141" font-family="Arial,sans-serif" font-size="11" fill="#92400e" text-anchor="middle">(tool_use block in response)</text>

  <!-- Arrows down -->
  <line x1="162" y1="148" x2="162" y2="178" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="477" y1="148" x2="477" y2="178" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Left: processSlashCommand -->
  <rect x="50" y="180" width="225" height="40" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="162" y="197" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="bold">processSlashCommand()</text>
  <text x="162" y="213" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">find + dispatch command</text>

  <!-- Right: tool_use block handling -->
  <rect x="365" y="180" width="225" height="40" rx="5" fill="#f0f4f8" stroke="#f59e0b" stroke-width="2"/>
  <text x="477" y="197" font-family="Arial,sans-serif" font-size="12" fill="#92400e" text-anchor="middle" font-weight="bold">tool_use block handler</text>
  <text x="477" y="213" font-family="Arial,sans-serif" font-size="11" fill="#92400e" text-anchor="middle">parse tool name + parameters</text>

  <!-- Arrows down -->
  <line x1="162" y1="220" x2="162" y2="250" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="477" y1="220" x2="477" y2="250" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Left: No permission check -->
  <rect x="50" y="252" width="225" height="40" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="162" y="269" font-family="Arial,sans-serif" font-size="12" fill="#166534" text-anchor="middle" font-weight="bold">No permission check needed</text>
  <text x="162" y="285" font-family="Arial,sans-serif" font-size="11" fill="#166534" text-anchor="middle">(user explicitly triggered)</text>

  <!-- Right: Permission check -->
  <rect x="365" y="252" width="225" height="40" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="477" y="269" font-family="Arial,sans-serif" font-size="12" fill="#991b1b" text-anchor="middle" font-weight="bold">Permission check required</text>
  <text x="477" y="285" font-family="Arial,sans-serif" font-size="11" fill="#991b1b" text-anchor="middle">(toolPermissionContext check)</text>

  <!-- Arrows down -->
  <line x1="162" y1="292" x2="162" y2="322" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="477" y1="292" x2="477" y2="322" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Left outcomes -->
  <rect x="50" y="324" width="225" height="56" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="162" y="344" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle" font-weight="bold">Outcomes:</text>
  <text x="162" y="360" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">prompt → inject to conversation</text>
  <text x="162" y="376" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">local / local-jsx → direct exec/UI</text>

  <!-- Right outcomes -->
  <rect x="365" y="324" width="225" height="56" rx="5" fill="#f0f4f8" stroke="#f59e0b" stroke-width="2"/>
  <text x="477" y="344" font-family="Arial,sans-serif" font-size="11" fill="#92400e" text-anchor="middle" font-weight="bold">Outcomes:</text>
  <text x="477" y="360" font-family="Arial,sans-serif" font-size="11" fill="#92400e" text-anchor="middle">approved → execute tool logic</text>
  <text x="477" y="376" font-family="Arial,sans-serif" font-size="11" fill="#92400e" text-anchor="middle">denied → return error to model</text>

  <!-- Center divider -->
  <line x1="320" y1="44" x2="320" y2="400" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Bottom note: same capability, two interfaces -->
  <rect x="30" y="400" width="580" height="30" rx="5" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="320" y="420" font-family="Arial,sans-serif" font-size="11" fill="#475569" text-anchor="middle">Same underlying capability (e.g. file editing) can expose both /edit command AND FileEditTool — each suited to its trigger actor</text>
</svg>
