<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440" width="640" height="440">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="320" y="28" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#1e40af" text-anchor="middle">명령어 vs 도구 흐름</text>

  <!-- Left column header: Command path -->
  <rect x="30" y="48" width="265" height="36" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="162" y="72" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">명령어 경로 (사용자 시작)</text>

  <!-- Right column header: Tool path -->
  <rect x="345" y="48" width="265" height="36" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="477" y="72" font-family="Arial,sans-serif" font-size="13" fill="#92400e" text-anchor="middle" font-weight="bold">도구 경로 (모델 선택)</text>

  <!-- Left: User direct input -->
  <rect x="50" y="108" width="225" height="40" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="162" y="125" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="bold">사용자가 /명령어 입력</text>
  <text x="162" y="141" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">(명시적 사용자 의도)</text>

  <!-- Right: Model reasoning -->
  <rect x="365" y="108" width="225" height="40" rx="5" fill="#f0f4f8" stroke="#f59e0b" stroke-width="2"/>
  <text x="477" y="125" font-family="Arial,sans-serif" font-size="12" fill="#92400e" text-anchor="middle" font-weight="bold">모델 추론으로 도구 선택</text>
  <text x="477" y="141" font-family="Arial,sans-serif" font-size="11" fill="#92400e" text-anchor="middle">(응답 내 tool_use 블록)</text>

  <!-- Arrows down -->
  <line x1="162" y1="148" x2="162" y2="178" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="477" y1="148" x2="477" y2="178" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Left: processSlashCommand -->
  <rect x="50" y="180" width="225" height="40" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="162" y="197" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="bold">processSlashCommand()</text>
  <text x="162" y="213" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">명령어 탐색 및 분기</text>

  <!-- Right: tool_use block handling -->
  <rect x="365" y="180" width="225" height="40" rx="5" fill="#f0f4f8" stroke="#f59e0b" stroke-width="2"/>
  <text x="477" y="197" font-family="Arial,sans-serif" font-size="12" fill="#92400e" text-anchor="middle" font-weight="bold">tool_use 블록 핸들러</text>
  <text x="477" y="213" font-family="Arial,sans-serif" font-size="11" fill="#92400e" text-anchor="middle">도구명 + 파라미터 파싱</text>

  <!-- Arrows down -->
  <line x1="162" y1="220" x2="162" y2="250" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="477" y1="220" x2="477" y2="250" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Left: No permission check -->
  <rect x="50" y="252" width="225" height="40" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="162" y="269" font-family="Arial,sans-serif" font-size="12" fill="#166534" text-anchor="middle" font-weight="bold">권한 확인 불필요</text>
  <text x="162" y="285" font-family="Arial,sans-serif" font-size="11" fill="#166534" text-anchor="middle">(사용자가 명시적으로 트리거)</text>

  <!-- Right: Permission check -->
  <rect x="365" y="252" width="225" height="40" rx="5" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="477" y="269" font-family="Arial,sans-serif" font-size="12" fill="#991b1b" text-anchor="middle" font-weight="bold">권한 확인 필요</text>
  <text x="477" y="285" font-family="Arial,sans-serif" font-size="11" fill="#991b1b" text-anchor="middle">(toolPermissionContext 확인)</text>

  <!-- Arrows down -->
  <line x1="162" y1="292" x2="162" y2="322" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="477" y1="292" x2="477" y2="322" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Left outcomes -->
  <rect x="50" y="324" width="225" height="56" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="162" y="344" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle" font-weight="bold">결과:</text>
  <text x="162" y="360" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">prompt → 대화에 주입</text>
  <text x="162" y="376" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">local / local-jsx → 직접 실행/UI</text>

  <!-- Right outcomes -->
  <rect x="365" y="324" width="225" height="56" rx="5" fill="#f0f4f8" stroke="#f59e0b" stroke-width="2"/>
  <text x="477" y="344" font-family="Arial,sans-serif" font-size="11" fill="#92400e" text-anchor="middle" font-weight="bold">결과:</text>
  <text x="477" y="360" font-family="Arial,sans-serif" font-size="11" fill="#92400e" text-anchor="middle">승인 → 도구 로직 실행</text>
  <text x="477" y="376" font-family="Arial,sans-serif" font-size="11" fill="#92400e" text-anchor="middle">거부 → 모델에 오류 반환</text>

  <!-- Center divider -->
  <line x1="320" y1="44" x2="320" y2="400" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Bottom note: same capability, two interfaces -->
  <rect x="30" y="400" width="580" height="30" rx="5" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="320" y="420" font-family="Arial,sans-serif" font-size="11" fill="#475569" text-anchor="middle">동일한 기능(예: 파일 편집)은 /edit 명령어와 FileEditTool 양쪽으로 노출 가능 — 각 트리거 주체에 적합</text>
</svg>
