<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" width="720" height="460">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="28" font-family="Arial,sans-serif" font-size="15" fill="#1e40af" text-anchor="middle" font-weight="bold">Config Hot Reload Flow</text>

  <!-- File change trigger -->
  <rect x="235" y="45" width="250" height="40" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="360" y="70" font-family="Arial,sans-serif" font-size="13" fill="#92400e" text-anchor="middle">Settings file change on disk</text>

  <!-- Arrow -->
  <line x1="360" y1="85" x2="360" y2="115" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- settingsChangeDetector -->
  <rect x="210" y="115" width="300" height="40" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="360" y="140" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">settingsChangeDetector detects</text>

  <!-- Arrow -->
  <line x1="360" y1="155" x2="360" y2="185" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Debounce -->
  <rect x="250" y="185" width="220" height="40" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="360" y="210" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">Debounce processing</text>

  <!-- Arrow -->
  <line x1="360" y1="225" x2="360" y2="255" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- applySettingsChange -->
  <rect x="225" y="255" width="270" height="40" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="360" y="280" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">applySettingsChange()</text>

  <!-- Arrow down -->
  <line x1="360" y1="295" x2="360" y2="320" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4 updates in a box -->
  <rect x="90" y="320" width="580" height="100" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="345" font-family="Arial,sans-serif" font-size="12" fill="#1e40af">1. Permission context reload</text>
  <text x="150" y="365" font-family="Arial,sans-serif" font-size="12" fill="#1e40af">2. Hook configuration reload</text>
  <text x="150" y="385" font-family="Arial,sans-serif" font-size="12" fill="#1e40af">3. Environment variable reload</text>
  <text x="150" y="405" font-family="Arial,sans-serif" font-size="12" fill="#1e40af">4. Refresh other settings-dependent components</text>

  <!-- Arrow -->
  <line x1="360" y1="420" x2="360" y2="440" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- AppState update -->
  <rect x="245" y="440" width="230" height="14" rx="5" fill="#e0e7ff" stroke="#6366f1" stroke-width="1"/>
  <text x="360" y="452" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">AppState updated — changes take effect immediately</text>
</svg>
