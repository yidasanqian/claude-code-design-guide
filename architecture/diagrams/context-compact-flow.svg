<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 660">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0,10 3,0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="660" fill="white"/>

  <!-- Title -->
  <text x="410" y="28" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#1e40af" text-anchor="middle">compact.ts — Compaction Flow</text>

  <!-- ===== PHASE LABELS ===== -->
  <!-- Pre-Compact Phase label -->
  <rect x="10" y="44" width="130" height="24" fill="#dbeafe" stroke="#93c5fd" stroke-width="1" rx="4"/>
  <text x="75" y="60" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#1e40af" text-anchor="middle">Pre-Compact Phase</text>

  <!-- Summarization Phase label -->
  <rect x="10" y="294" width="150" height="24" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1" rx="4"/>
  <text x="85" y="310" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#065f46" text-anchor="middle">Summarization Phase</text>

  <!-- Post-Compact Phase label -->
  <rect x="10" y="434" width="150" height="24" fill="#fef3c7" stroke="#fcd34d" stroke-width="1" rx="4"/>
  <text x="85" y="450" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#92400e" text-anchor="middle">Post-Compact Phase</text>

  <!-- ===== TRUNK LINE ===== -->
  <line x1="240" y1="44" x2="240" y2="626" stroke="#666" stroke-width="2"/>

  <!-- Entry arrow -->
  <line x1="240" y1="44" x2="240" y2="44" stroke="#666" stroke-width="2"/>

  <!-- ===== PRE-COMPACT BOXES ===== -->

  <!-- 1. executePreCompactHooks -->
  <line x1="240" y1="68" x2="310" y2="68" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="310" y="54" width="470" height="28" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="545" y="65" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="bold">executePreCompactHooks()</text>
  <text x="545" y="78" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">hooks can modify messages, add context</text>

  <!-- sub-indent line -->
  <line x1="340" y1="82" x2="340" y2="100" stroke="#aaa" stroke-width="1"/>
  <line x1="340" y1="91" x2="370" y2="91" stroke="#aaa" stroke-width="1" marker-end="url(#arr)"/>
  <text x="375" y="95" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">hooks modify messages / add context</text>

  <!-- 2. stripImagesFromMessages -->
  <line x1="240" y1="120" x2="310" y2="120" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="310" y="106" width="470" height="28" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="545" y="117" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="bold">stripImagesFromMessages()</text>
  <text x="545" y="130" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">images replaced with "[image]" marker</text>

  <!-- 3. Message Grouping -->
  <line x1="240" y1="170" x2="310" y2="170" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="310" y="156" width="470" height="28" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="545" y="167" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="bold">Message Grouping</text>
  <text x="545" y="180" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">groupMessagesByApiRound() — group by API round</text>

  <!-- 4. Preserve Tail -->
  <line x1="240" y1="220" x2="310" y2="220" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="310" y="206" width="470" height="28" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="545" y="217" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="bold">Preserve Tail</text>
  <text x="545" y="230" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">keep recent messages (not compressed), ensure latest context survives</text>

  <!-- Phase separator line -->
  <line x1="160" y1="250" x2="790" y2="250" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ===== SUMMARIZATION BOXES ===== -->

  <!-- 5. queryModelWithStreaming -->
  <line x1="240" y1="318" x2="310" y2="318" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="310" y="304" width="470" height="28" fill="#ecfdf5" stroke="#10b981" stroke-width="2" rx="5"/>
  <text x="545" y="315" font-family="Arial,sans-serif" font-size="12" fill="#065f46" text-anchor="middle" font-weight="bold">queryModelWithStreaming()</text>
  <text x="545" y="328" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">API call → stream summary text (compaction-specific model)</text>

  <!-- 6. Create Boundary Message -->
  <line x1="240" y1="368" x2="310" y2="368" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="310" y="354" width="470" height="28" fill="#ecfdf5" stroke="#10b981" stroke-width="2" rx="5"/>
  <text x="545" y="365" font-family="Arial,sans-serif" font-size="12" fill="#065f46" text-anchor="middle" font-weight="bold">createCompactBoundaryMessage()</text>
  <text x="545" y="378" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">marks compression point; subsequent messages start here</text>

  <!-- Phase separator line -->
  <line x1="160" y1="400" x2="790" y2="400" stroke="#d1d5db" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ===== POST-COMPACT BOXES ===== -->

  <!-- 7. executePostCompactHooks -->
  <line x1="240" y1="458" x2="310" y2="458" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="310" y="444" width="470" height="28" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="545" y="455" font-family="Arial,sans-serif" font-size="12" fill="#92400e" text-anchor="middle" font-weight="bold">executePostCompactHooks()</text>
  <text x="545" y="468" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">post_compact hooks execute</text>

  <!-- 8. Restore Files -->
  <line x1="240" y1="500" x2="310" y2="500" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="310" y="486" width="470" height="28" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="545" y="497" font-family="Arial,sans-serif" font-size="12" fill="#92400e" text-anchor="middle" font-weight="bold">Restore Files</text>
  <text x="545" y="510" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">max 5 files · 5K tok/file · 50K total budget</text>

  <!-- 9. Restore Skills -->
  <line x1="240" y1="542" x2="310" y2="542" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="310" y="528" width="470" height="28" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="545" y="539" font-family="Arial,sans-serif" font-size="12" fill="#92400e" text-anchor="middle" font-weight="bold">Restore Skills</text>
  <text x="545" y="552" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">5K tok/skill · 25K total budget</text>

  <!-- 10. runPostCompactCleanup -->
  <line x1="240" y1="584" x2="310" y2="584" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="310" y="570" width="470" height="56" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="545" y="583" font-family="Arial,sans-serif" font-size="12" fill="#92400e" text-anchor="middle" font-weight="bold">runPostCompactCleanup()</text>
  <text x="545" y="598" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">notifyCompaction → setLastSummarizedMessageId</text>
  <text x="545" y="613" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">→ markPostCompaction (bootstrap state)</text>

  <!-- End arrow -->
  <line x1="240" y1="626" x2="240" y2="644" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <text x="245" y="655" font-family="Arial,sans-serif" font-size="11" fill="#6b7280">CompactionResult returned</text>
</svg>
