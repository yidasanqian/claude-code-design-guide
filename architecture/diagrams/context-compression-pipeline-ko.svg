<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0,10 3,0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="white"/>

  <!-- Title -->
  <text x="400" y="32" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#1e40af" text-anchor="middle">컨텍스트 압축 파이프라인 (query.ts 반복 실행마다)</text>

  <!-- query.ts entry box -->
  <rect x="290" y="50" width="220" height="38" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="400" y="70" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">query.ts</text>
  <text x="400" y="84" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">(각 루프 반복)</text>

  <!-- Trunk arrow down -->
  <line x1="400" y1="88" x2="400" y2="115" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Branch connector vertical line -->
  <line x1="400" y1="115" x2="400" y2="355" stroke="#666" stroke-width="2"/>

  <!-- Row 1: applyToolResultBudget -->
  <line x1="400" y1="130" x2="450" y2="130" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="450" y="112" width="280" height="36" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="590" y="127" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="bold">applyToolResultBudget</text>
  <text x="590" y="142" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">20KB 초과 결과를 디스크에 저장</text>

  <!-- Row 2: snipCompact -->
  <line x1="400" y1="168" x2="450" y2="168" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="450" y="150" width="280" height="36" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="590" y="165" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="bold">snipCompact</text>
  <text x="590" y="180" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">오래된 히스토리 잘라내기 (HISTORY_SNIP)</text>

  <!-- Row 3: microcompact -->
  <line x1="400" y1="206" x2="450" y2="206" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="450" y="188" width="280" height="36" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="590" y="203" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="bold">microcompact</text>
  <text x="590" y="218" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">로컬 압축, API 호출 없음</text>

  <!-- Row 4: contextCollapse -->
  <line x1="400" y1="244" x2="450" y2="244" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="450" y="226" width="280" height="36" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="590" y="241" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="bold">contextCollapse</text>
  <text x="590" y="256" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">단계적 접기 (CONTEXT_COLLAPSE)</text>

  <!-- Row 5: autocompact -->
  <line x1="400" y1="282" x2="450" y2="282" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="450" y="264" width="280" height="36" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="590" y="279" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="bold">autocompact</text>
  <text x="590" y="294" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">API 호출, 요약 생성</text>

  <!-- Row 6: reactiveCompact -->
  <line x1="400" y1="355" x2="450" y2="355" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="450" y="337" width="280" height="36" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="590" y="352" font-family="Arial,sans-serif" font-size="12" fill="#92400e" text-anchor="middle" font-weight="bold">[reactiveCompact]</text>
  <text x="590" y="367" font-family="Arial,sans-serif" font-size="11" fill="#92400e" text-anchor="middle">긴급 — 413 에러 시 발동 (REACTIVE_COMPACT)</text>

  <!-- Cost labels on left side -->
  <rect x="20" y="178" width="90" height="24" fill="#dcfce7" stroke="#16a34a" stroke-width="1" rx="4"/>
  <text x="65" y="194" font-family="Arial,sans-serif" font-size="11" fill="#15803d" text-anchor="middle">무료 / 빠름</text>

  <rect x="20" y="258" width="90" height="24" fill="#fef9c3" stroke="#ca8a04" stroke-width="1" rx="4"/>
  <text x="65" y="274" font-family="Arial,sans-serif" font-size="11" fill="#854d0e" text-anchor="middle">API 비용</text>

  <rect x="20" y="335" width="90" height="24" fill="#fee2e2" stroke="#dc2626" stroke-width="1" rx="4"/>
  <text x="65" y="351" font-family="Arial,sans-serif" font-size="11" fill="#991b1b" text-anchor="middle">긴급</text>

  <!-- Bottom note -->
  <text x="400" y="400" font-family="Arial,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">순서: snip → micro → collapse → autocompact → [413 시 reactive]</text>
</svg>
