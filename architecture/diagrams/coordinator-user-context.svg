<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
  </defs>

  <!-- Main Box -->
  <rect x="50" y="20" width="400" height="240" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="250" y="50" font-family="Arial,sans-serif" fill="#1e40af" font-size="14" font-weight="bold" text-anchor="middle">Coordinator Context Example</text>

  <!-- Available Worker Tools -->
  <text x="70" y="80" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">Available Worker Tools:</text>
  <text x="90" y="100" font-family="Arial,sans-serif" fill="#666" font-size="11">- Read, Write, Edit, Bash, Grep, Glob</text>
  <text x="90" y="118" font-family="Arial,sans-serif" fill="#666" font-size="11">- ListMcpResources, ReadMcpResource</text>

  <!-- MCP Servers -->
  <text x="70" y="148" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">MCP Servers:</text>
  <text x="90" y="168" font-family="Arial,sans-serif" fill="#666" font-size="11">- github: PR, Issues, Reviews</text>
  <text x="90" y="186" font-family="Arial,sans-serif" fill="#666" font-size="11">- postgres: Query, Schema</text>

  <!-- Scratch Directory -->
  <text x="70" y="216" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">Scratch Directory:</text>
  <text x="90" y="236" font-family="Arial,sans-serif" fill="#666" font-size="11">/tmp/claude-coord-&lt;session-id&gt;/</text>
</svg>
