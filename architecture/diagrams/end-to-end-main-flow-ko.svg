<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <rect x="300" y="20" width="200" height="40" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="400" y="45" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">사용자 텍스트 입력</text>

  <rect x="300" y="80" width="200" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="400" y="105" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">PromptInput (React/Ink)</text>

  <rect x="300" y="140" width="200" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="400" y="165" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">processUserInput()</text>

  <rect x="300" y="200" width="200" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="400" y="225" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">AppState.messages</text>

  <rect x="250" y="260" width="300" height="60" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="400" y="285" font-family="Arial,sans-serif" font-size="13" fill="#78350f" text-anchor="middle" font-weight="bold">query() 메인 루프</text>
  <text x="400" y="305" font-family="Arial,sans-serif" font-size="11" fill="#78350f" text-anchor="middle">(비동기 제너레이터)</text>

  <rect x="50" y="350" width="180" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="140" y="370" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">1단계:</text>
  <text x="140" y="388" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">컨텍스트 조립</text>

  <rect x="250" y="350" width="140" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="320" y="370" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">2단계:</text>
  <text x="320" y="388" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">API 호출</text>

  <rect x="410" y="350" width="140" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="480" y="370" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">3단계:</text>
  <text x="480" y="388" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">도구 실행</text>

  <rect x="570" y="350" width="180" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="660" y="370" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">4단계:</text>
  <text x="660" y="388" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">복구 및 제어</text>

  <rect x="50" y="420" width="180" height="80" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="3"/>
  <text x="140" y="440" font-family="Arial,sans-serif" font-size="10" fill="#475569">• 메모리 프리패치</text>
  <text x="140" y="455" font-family="Arial,sans-serif" font-size="10" fill="#475569">• 도구 결과 예산</text>
  <text x="140" y="470" font-family="Arial,sans-serif" font-size="10" fill="#475569">• 첨부 파일</text>
  <text x="140" y="485" font-family="Arial,sans-serif" font-size="10" fill="#475569">• 자동 압축</text>
  <text x="140" y="500" font-family="Arial,sans-serif" font-size="10" fill="#475569">• 시스템 프롬프트</text>

  <rect x="250" y="420" width="140" height="80" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="3"/>
  <text x="320" y="440" font-family="Arial,sans-serif" font-size="10" fill="#475569">• 멀티 백엔드</text>
  <text x="320" y="455" font-family="Arial,sans-serif" font-size="10" fill="#475569">• 정규화</text>
  <text x="320" y="470" font-family="Arial,sans-serif" font-size="10" fill="#475569">• 재시도 로직</text>
  <text x="320" y="485" font-family="Arial,sans-serif" font-size="10" fill="#475569">• 스트리밍</text>

  <rect x="410" y="420" width="140" height="80" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="3"/>
  <text x="480" y="440" font-family="Arial,sans-serif" font-size="10" fill="#475569">• 권한 확인</text>
  <text x="480" y="455" font-family="Arial,sans-serif" font-size="10" fill="#475569">• Pre/Post 훅</text>
  <text x="480" y="470" font-family="Arial,sans-serif" font-size="10" fill="#475569">• Tool.execute()</text>
  <text x="480" y="485" font-family="Arial,sans-serif" font-size="10" fill="#475569">• 결과 빌드</text>

  <rect x="570" y="420" width="180" height="80" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="3"/>
  <text x="660" y="440" font-family="Arial,sans-serif" font-size="10" fill="#475569">• 5계층 복구</text>
  <text x="660" y="455" font-family="Arial,sans-serif" font-size="10" fill="#475569">• Stop 훅</text>
  <text x="660" y="470" font-family="Arial,sans-serif" font-size="10" fill="#475569">• 토큰 예산</text>
  <text x="660" y="485" font-family="Arial,sans-serif" font-size="10" fill="#475569">• 계속/종료</text>

  <rect x="300" y="530" width="200" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="400" y="555" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">AppState.messages 업데이트</text>

  <rect x="300" y="590" width="200" height="40" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="5"/>
  <text x="400" y="615" font-family="Arial,sans-serif" font-size="12" fill="#14532d" text-anchor="middle">React 컴포넌트 리렌더링</text>

  <rect x="250" y="650" width="300" height="40" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="3"/>
  <text x="400" y="675" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">REPL • 스피너 • 상태 표시줄 • 도구 결과</text>

  <line x1="400" y1="60" x2="400" y2="80" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="120" x2="400" y2="140" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="180" x2="400" y2="200" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="240" x2="400" y2="260" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="320" x2="400" y2="530" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="570" x2="400" y2="590" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="630" x2="400" y2="650" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <path d="M 700,375 L 750,375 L 750,290 L 400,290" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="720" y="330" font-family="Arial,sans-serif" font-size="10" fill="#f59e0b">루프</text>
