<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <text x="350" y="25" font-family="Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle" font-weight="bold">Feedback Data Collection Flow</text>

  <rect x="250" y="50" width="200" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="350" y="75" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">useFeedbackSurvey()</text>
  <text x="350" y="90" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">probability gate</text>

  <rect x="250" y="125" width="200" height="60" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="350" y="145" font-family="Arial,sans-serif" font-size="11" fill="#78350f" text-anchor="middle">FeedbackSurvey state machine</text>
  <text x="350" y="162" font-family="Arial,sans-serif" font-size="10" fill="#78350f" text-anchor="middle">closed → open → [user choice]</text>
  <text x="350" y="177" font-family="Arial,sans-serif" font-size="10" fill="#78350f" text-anchor="middle">0:Dismiss / 1:Bad / 2:Fine / 3:Good</text>

  <rect x="50" y="220" width="150" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="125" y="245" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">useMemorySurvey()</text>

  <rect x="225" y="220" width="150" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="300" y="245" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">usePostCompactSurvey()</text>

  <rect x="400" y="220" width="150" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="475" y="245" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">/feedback command</text>

  <rect x="575" y="220" width="100" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="625" y="245" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">/good-claude</text>

  <rect x="250" y="290" width="200" height="60" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="5"/>
  <text x="350" y="312" font-family="Arial,sans-serif" font-size="11" fill="#14532d" text-anchor="middle">TranscriptSharePrompt</text>
  <text x="350" y="328" font-family="Arial,sans-serif" font-size="10" fill="#14532d" text-anchor="middle">1:Yes → POST API</text>
  <text x="350" y="343" font-family="Arial,sans-serif" font-size="10" fill="#14532d" text-anchor="middle">2:No / 3:Don't ask again</text>

  <rect x="250" y="380" width="200" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="350" y="400" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">Tips System</text>
  <text x="350" y="418" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">60+ tips, shown during Spinner</text>

  <rect x="200" y="460" width="300" height="60" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="350" y="482" font-family="Arial,sans-serif" font-size="12" fill="#78350f" text-anchor="middle" font-weight="bold">Analytics Data Routing</text>
  <text x="350" y="498" font-family="Arial,sans-serif" font-size="10" fill="#78350f" text-anchor="middle">logEvent() → event queue</text>
  <text x="350" y="513" font-family="Arial,sans-serif" font-size="10" fill="#78350f" text-anchor="middle">→ Datadog + 1P event log</text>

  <rect x="50" y="550" width="600" height="40" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="3"/>
  <text x="60" y="570" font-family="Arial,sans-serif" font-size="10" fill="#475569">stripProtoFields() removes PII before sending to Datadog</text>
  <text x="60" y="585" font-family="Arial,sans-serif" font-size="10" fill="#475569">1P event log retains full payload with _PROTO_* fields</text>

  <line x1="350" y1="100" x2="350" y2="125" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="185" x2="125" y2="220" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="185" x2="300" y2="220" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="185" x2="475" y2="220" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="185" x2="625" y2="220" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="185" x2="350" y2="290" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="350" x2="350" y2="380" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="430" x2="350" y2="460" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
</svg>
