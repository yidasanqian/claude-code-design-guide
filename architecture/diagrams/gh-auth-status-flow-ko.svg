<svg xmlns="http://www.w3.org/2000/svg" width="480" height="270" viewBox="0 0 480 270">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- gh auth token box -->
  <rect x="155" y="10" width="170" height="40" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="240" y="30" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="13" font-weight="bold">gh auth token</text>
  <text x="240" y="45" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">(로컬 자격증명)</text>

  <!-- Arrow down -->
  <line x1="240" y1="50" x2="240" y2="80" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Diamond decision -->
  <polygon points="240,82 310,115 240,148 170,115" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="240" y="110" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12">토큰</text>
  <text x="240" y="126" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12">결과?</text>

  <!-- Arrow left: has token -->
  <line x1="170" y1="115" x2="100" y2="115" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="133" y="107" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">토큰 있음</text>

  <!-- Arrow right: no token -->
  <line x1="310" y1="115" x2="380" y2="115" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="345" y="107" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">토큰 없음</text>

  <!-- Arrow down: not installed -->
  <line x1="240" y1="148" x2="240" y2="190" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="267" y="175" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">미설치</text>

  <!-- Left result: authenticated -->
  <rect x="5" y="90" width="95" height="50" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="53" y="112" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">인증됨</text>
  <text x="53" y="128" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">GitHub 기능</text>
  <text x="53" y="140" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">활성화</text>

  <!-- Right result: not_authenticated -->
  <rect x="380" y="90" width="95" height="50" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="428" y="109" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11" font-weight="bold">인증 안됨</text>
  <text x="428" y="125" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">사용자 안내:</text>
  <text x="428" y="138" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">gh auth login</text>

  <!-- Bottom result: not_installed -->
  <rect x="155" y="192" width="170" height="50" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="240" y="212" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">미설치</text>
  <text x="240" y="228" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">GitHub 기능</text>
  <text x="240" y="241" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">전체 건너뜀</text>
</svg>
