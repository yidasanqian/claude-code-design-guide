<svg xmlns="http://www.w3.org/2000/svg" width="500" height="470" viewBox="0 0 500 470">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrow-left" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#666"/>
    </marker>
  </defs>

  <!-- .git files column (left) -->
  <rect x="20" y="10" width="150" height="130" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="95" y="30" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">.git/ 파일</text>
  <line x1="20" y1="35" x2="170" y2="35" stroke="#2563eb" stroke-width="1"/>
  <text x="35" y="56" font-family="Arial,sans-serif" fill="#1e40af" font-size="12">.git/HEAD</text>
  <text x="35" y="76" font-family="Arial,sans-serif" fill="#1e40af" font-size="12">.git/config</text>
  <text x="35" y="96" font-family="Arial,sans-serif" fill="#1e40af" font-size="12">.git/refs/</text>
  <text x="35" y="116" font-family="Arial,sans-serif" fill="#1e40af" font-size="12">.git/packed-refs</text>
  <text x="35" y="134" font-family="Arial,sans-serif" fill="#1e40af" font-size="12">.git/shallow</text>

  <!-- GitFileWatcher column (right of files) -->
  <rect x="300" y="30" width="160" height="65" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="380" y="52" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">GitFileWatcher</text>
  <text x="380" y="70" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">fs.watch 감시</text>
  <text x="380" y="86" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">캐시 무효화</text>

  <!-- Arrow from .git files right to watcher -->
  <line x1="170" y1="75" x2="298" y2="63" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow from .git files down to gitFilesystem.ts -->
  <line x1="95" y1="140" x2="95" y2="185" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow from GitFileWatcher down-left to gitFilesystem.ts -->
  <line x1="330" y1="95" x2="200" y2="200" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="288" y="138" font-family="Arial,sans-serif" fill="#666" font-size="10">캐시 무효화</text>

  <!-- gitFilesystem.ts + gitConfigParser.ts box -->
  <rect x="20" y="188" width="280" height="55" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="160" y="210" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="13" font-weight="bold">gitFilesystem.ts</text>
  <text x="160" y="232" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">gitConfigParser.ts</text>

  <!-- Arrow down -->
  <line x1="160" y1="243" x2="160" y2="275" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Cached Functions box -->
  <rect x="20" y="278" width="280" height="60" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="160" y="300" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="13" font-weight="bold">캐시된 함수</text>
  <text x="160" y="318" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">getCachedBranch() / getCachedHead()</text>
  <text x="160" y="333" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">getCachedRemoteUrl() / ...</text>

  <!-- Arrow down -->
  <line x1="160" y1="338" x2="160" y2="370" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- context.ts box -->
  <rect x="20" y="373" width="280" height="50" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="160" y="395" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="13" font-weight="bold">context.ts</text>
  <text x="160" y="414" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">메모이제이션된 getGitStatus()</text>

  <!-- Arrow down -->
  <line x1="160" y1="423" x2="160" y2="450" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- System Prompt Injection box -->
  <rect x="20" y="453" width="280" height="12" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="160" y="463" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11" font-weight="bold">시스템 프롬프트 주입</text>
</svg>
