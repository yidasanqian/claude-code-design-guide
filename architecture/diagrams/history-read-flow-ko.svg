<svg xmlns="http://www.w3.org/2000/svg" width="420" height="280" viewBox="0 0 420 280">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- History File (JSONL) -->
  <rect x="130" y="10" width="160" height="42" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="210" y="30" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="13" font-weight="bold">히스토리 파일 (JSONL)</text>
  <text x="210" y="46" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">디스크 영속성</text>

  <!-- Arrow down -->
  <line x1="210" y1="52" x2="210" y2="84" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- makeHistoryReader() -->
  <rect x="80" y="87" width="260" height="50" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="210" y="108" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="13" font-weight="bold">makeHistoryReader()</text>
  <text x="210" y="128" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">비동기 제너레이터 — 줄 단위 파싱 (역순)</text>

  <!-- Arrow down -->
  <line x1="210" y1="137" x2="210" y2="169" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- getTimestampedHistory() -->
  <rect x="80" y="172" width="260" height="50" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="210" y="193" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="13" font-weight="bold">getTimestampedHistory()</text>
  <text x="210" y="213" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">중복 제거 (sessionId 기준) + 정렬</text>

  <!-- Arrow down -->
  <line x1="210" y1="222" x2="210" y2="254" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- UI Display -->
  <rect x="130" y="257" width="160" height="18" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="210" y="270" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11" font-weight="bold">UI 표시 (세션 선택기)</text>
</svg>
