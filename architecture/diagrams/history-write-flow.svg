<svg xmlns="http://www.w3.org/2000/svg" width="420" height="260" viewBox="0 0 420 260">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- addToHistory(entry) -->
  <rect x="130" y="10" width="160" height="42" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="210" y="30" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="13" font-weight="bold">addToHistory(entry)</text>
  <text x="210" y="46" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">called by session</text>

  <!-- Arrow down -->
  <line x1="210" y1="52" x2="210" y2="84" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Memory Buffer -->
  <rect x="90" y="87" width="240" height="55" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="210" y="108" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="13" font-weight="bold">Memory Buffer</text>
  <text x="210" y="125" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">in-memory accumulation</text>
  <text x="210" y="140" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">non-blocking, instant return</text>

  <!-- Arrow down labeled async flush / batched -->
  <line x1="210" y1="142" x2="210" y2="174" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="220" y="160" font-family="Arial,sans-serif" fill="#666" font-size="11">async flush (batched)</text>

  <!-- History File (disk) -->
  <rect x="90" y="177" width="240" height="50" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="210" y="198" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="13" font-weight="bold">History File (disk)</text>
  <text x="210" y="216" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">JSONL — appendFile</text>

  <!-- Note -->
  <text x="210" y="248" text-anchor="middle" font-family="Arial,sans-serif" fill="#666" font-size="11">Benefit: does not block main thread, reduces I/O</text>
</svg>
