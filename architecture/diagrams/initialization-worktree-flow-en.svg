<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" font-family="Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0,10 3,0 6" fill="#666"/>
    </marker>
  </defs>
  <rect width="760" height="500" fill="white"/>

  <!-- Title -->
  <text x="380" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e40af">Worktree Creation Flow</text>

  <!-- Entry -->
  <rect x="270" y="45" width="220" height="36" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="380" y="68" text-anchor="middle" font-size="13" fill="#1e40af">worktreeEnabled = true</text>

  <line x1="380" y1="81" x2="380" y2="105" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Check git or hook -->
  <polygon points="380,105 540,132 380,159 220,132" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="380" y="128" text-anchor="middle" font-size="11" fill="#92400e">hasWorktreeCreateHook()</text>
  <text x="380" y="143" text-anchor="middle" font-size="11" fill="#92400e">|| getIsGit()?</text>

  <!-- No branch -->
  <line x1="540" y1="132" x2="650" y2="132" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <text x="597" y="125" text-anchor="middle" font-size="11" fill="#666">No</text>
  <rect x="650" y="110" width="100" height="44" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="5"/>
  <text x="700" y="128" text-anchor="middle" font-size="11" fill="#991b1b">Skip worktree</text>
  <text x="700" y="142" text-anchor="middle" font-size="11" fill="#991b1b">creation</text>

  <!-- Yes branch down -->
  <line x1="380" y1="159" x2="380" y2="183" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <text x="392" y="175" font-size="11" fill="#666">Yes</text>

  <!-- findCanonicalGitRoot -->
  <rect x="245" y="183" width="270" height="36" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="380" y="206" text-anchor="middle" font-size="13" fill="#1e40af">findCanonicalGitRoot()</text>

  <line x1="380" y1="219" x2="380" y2="243" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- createWorktreeForSession -->
  <rect x="215" y="243" width="330" height="36" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="380" y="266" text-anchor="middle" font-size="13" fill="#1e40af">createWorktreeForSession(sessionId, slug, ...)</text>

  <line x1="380" y1="279" x2="380" y2="303" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- tmux decision -->
  <polygon points="380,303 530,323 380,343 230,323" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="380" y="320" text-anchor="middle" font-size="11" fill="#92400e">tmuxEnabled?</text>

  <!-- Yes tmux -->
  <line x1="530" y1="323" x2="635" y2="323" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <text x="585" y="316" text-anchor="middle" font-size="11" fill="#666">Yes</text>
  <rect x="635" y="303" width="110" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="690" y="320" text-anchor="middle" font-size="11" fill="#1e40af">createTmux</text>
  <text x="690" y="334" text-anchor="middle" font-size="11" fill="#1e40af">SessionForWorktree()</text>

  <!-- No tmux continues down -->
  <line x1="380" y1="343" x2="380" y2="367" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <text x="392" y="359" font-size="11" fill="#666">No</text>

  <!-- process.chdir -->
  <rect x="260" y="367" width="240" height="36" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="380" y="390" text-anchor="middle" font-size="13" fill="#1e40af">process.chdir(worktreePath)</text>

  <line x1="380" y1="403" x2="380" y2="427" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- setCwd + state updates -->
  <rect x="200" y="427" width="360" height="36" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="380" y="444" text-anchor="middle" font-size="12" fill="#1e40af">setCwd() + setOriginalCwd() + setProjectRoot()</text>
  <text x="380" y="458" text-anchor="middle" font-size="11" fill="#6b7280">saveWorktreeState() + clearMemoryFileCaches() + updateHooksConfigSnapshot()</text>

  <!-- tmux merges back -->
  <line x1="690" y1="343" x2="690" y2="415" stroke="#666" stroke-width="2"/>
  <line x1="690" y1="415" x2="560" y2="415" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
</svg>
