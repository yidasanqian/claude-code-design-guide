<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
    <style>
      .layer { fill: #f0f4f8; stroke: #2563eb; stroke-width: 2; }
      .layer-text { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #1e40af; }
      .desc-text { font-family: Arial, sans-serif; font-size: 12px; fill: #475569; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1e293b; }
    </style>
  </defs>

  <text x="400" y="30" class="title" text-anchor="middle">Claude Code 6계층 아키텍처</text>

  <!-- Layer 1: UI -->
  <rect x="100" y="60" width="600" height="70" class="layer" rx="5"/>
  <text x="400" y="85" class="layer-text" text-anchor="middle">UI 계층</text>
  <text x="400" y="105" class="desc-text" text-anchor="middle">React/Ink 컴포넌트 - 순수 렌더링</text>
  <text x="400" y="120" class="desc-text" text-anchor="middle">components/, screens/</text>

  <!-- Arrow 1->2 -->
  <line x1="400" y1="130" x2="400" y2="150" class="arrow"/>

  <!-- Layer 2: Hooks -->
  <rect x="100" y="150" width="600" height="70" class="layer" rx="5"/>
  <text x="400" y="175" class="layer-text" text-anchor="middle">훅 계층</text>
  <text x="400" y="195" class="desc-text" text-anchor="middle">사이드 이펙트 및 상태 로직 캡슐화</text>
  <text x="400" y="210" class="desc-text" text-anchor="middle">hooks/ (70개 이상의 훅)</text>

  <!-- Arrow 2->3 -->
  <line x1="400" y1="220" x2="400" y2="240" class="arrow"/>

  <!-- Layer 3: State -->
  <rect x="100" y="240" width="600" height="70" class="layer" rx="5"/>
  <text x="400" y="265" class="layer-text" text-anchor="middle">상태 계층</text>
  <text x="400" y="285" class="desc-text" text-anchor="middle">프로세스 수준 생명주기 상태</text>
  <text x="400" y="300" class="desc-text" text-anchor="middle">bootstrap/state.ts, Zustand 스토어</text>

  <!-- Arrow 3->4 -->
  <line x1="400" y1="310" x2="400" y2="330" class="arrow"/>

  <!-- Layer 4: Query -->
  <rect x="100" y="330" width="600" height="70" class="layer" rx="5"/>
  <text x="400" y="355" class="layer-text" text-anchor="middle">쿼리 계층</text>
  <text x="400" y="375" class="desc-text" text-anchor="middle">단일 대화 턴 임시 관리</text>
  <text x="400" y="390" class="desc-text" text-anchor="middle">query.ts (비동기 제너레이터)</text>

  <!-- Arrow 4->5 -->
  <line x1="400" y1="400" x2="400" y2="420" class="arrow"/>

  <!-- Layer 5: Services -->
  <rect x="100" y="420" width="600" height="70" class="layer" rx="5"/>
  <text x="400" y="445" class="layer-text" text-anchor="middle">서비스 계층</text>
  <text x="400" y="465" class="desc-text" text-anchor="middle">상태 없는 기능 프로바이더</text>
  <text x="400" y="480" class="desc-text" text-anchor="middle">services/ (API, 컴팩션, MCP)</text>

  <!-- Arrow 5->6 -->
  <line x1="400" y1="490" x2="400" y2="510" class="arrow"/>

  <!-- Layer 6: Tools -->
  <rect x="100" y="510" width="600" height="70" class="layer" rx="5"/>
  <text x="400" y="535" class="layer-text" text-anchor="middle">도구 계층</text>
  <text x="400" y="555" class="desc-text" text-anchor="middle">식별자가 있는 실행 단위</text>
  <text x="400" y="570" class="desc-text" text-anchor="middle">tools/ (Bash, Read, Write 등)</text>

</svg>
