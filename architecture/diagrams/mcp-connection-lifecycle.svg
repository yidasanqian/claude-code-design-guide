<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0,10 3,0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="360" fill="white"/>

  <!-- Title -->
  <text x="380" y="28" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#1e40af" text-anchor="middle">MCP Connection Lifecycle</text>

  <!-- getAllMcpConfigs() -->
  <rect x="240" y="44" width="280" height="34" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="380" y="58" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">getAllMcpConfigs()</text>
  <text x="380" y="73" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">collect configs from all scopes</text>

  <!-- Arrow -->
  <line x1="380" y1="78" x2="380" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- parseMcpConfig() -->
  <rect x="240" y="100" width="280" height="34" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="380" y="114" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">parseMcpConfig()</text>
  <text x="380" y="129" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">validate each server configuration</text>

  <!-- Arrow -->
  <line x1="380" y1="134" x2="380" y2="156" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- getMcpToolsCommandsAndResources() -->
  <rect x="200" y="156" width="360" height="34" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="380" y="170" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">getMcpToolsCommandsAndResources()</text>
  <text x="380" y="185" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">orchestrate all server connections in parallel</text>

  <!-- Arrow -->
  <line x1="380" y1="190" x2="380" y2="212" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Parallel connections box -->
  <rect x="160" y="212" width="440" height="34" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="380" y="226" font-family="Arial,sans-serif" font-size="12" fill="#92400e" text-anchor="middle" font-weight="bold">parallel connection per server</text>
  <text x="380" y="241" font-family="Arial,sans-serif" font-size="11" fill="#92400e" text-anchor="middle">stdio / SSE / HTTP / WebSocket transport</text>

  <!-- Arrow -->
  <line x1="380" y1="246" x2="380" y2="268" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Fetch data box -->
  <rect x="160" y="268" width="440" height="34" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="380" y="282" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="bold">fetchToolsForClient()  /  fetchCommandsForClient()  /  fetchResourcesForClient()</text>
  <text x="380" y="297" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">parallel: tools/list · prompts/list · resources/list</text>

  <!-- Arrow -->
  <line x1="380" y1="302" x2="380" y2="324" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Result box -->
  <rect x="160" y="324" width="440" height="24" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="5"/>
  <text x="380" y="340" font-family="Arial,sans-serif" font-size="12" fill="#15803d" text-anchor="middle" font-weight="bold">returns { tools, commands, resources, serverConnections }</text>
</svg>
