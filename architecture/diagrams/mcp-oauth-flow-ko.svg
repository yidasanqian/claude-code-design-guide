<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0,10 3,0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="420" fill="white"/>

  <!-- Title -->
  <text x="380" y="28" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#1e40af" text-anchor="middle">MCP OAuth 흐름 (SSE / HTTP 서버)</text>

  <!-- Step 1: 401 trigger -->
  <rect x="200" y="44" width="360" height="34" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="5"/>
  <text x="380" y="58" font-family="Arial,sans-serif" font-size="13" fill="#991b1b" text-anchor="middle" font-weight="bold">SSE / HTTP MCP 서버가 401 반환</text>
  <text x="380" y="73" font-family="Arial,sans-serif" font-size="11" fill="#991b1b" text-anchor="middle">인증 오류 — OAuth 흐름 시작됨</text>

  <line x1="380" y1="78" x2="380" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: discover metadata -->
  <rect x="200" y="100" width="360" height="34" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="380" y="115" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="bold">discoverAuthorizationServerMetadata()</text>
  <text x="380" y="129" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">OAuth 서버 메타데이터 가져오기 (well-known 엔드포인트)</text>

  <line x1="380" y1="134" x2="380" y2="156" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: sdkAuth PKCE -->
  <rect x="200" y="156" width="360" height="34" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="380" y="171" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="bold">sdkAuth()</text>
  <text x="380" y="185" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">OAuth PKCE 흐름 실행</text>

  <line x1="380" y1="190" x2="380" y2="212" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: openBrowser -->
  <rect x="200" y="212" width="360" height="34" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="380" y="227" font-family="Arial,sans-serif" font-size="12" fill="#92400e" text-anchor="middle" font-weight="bold">openBrowser()</text>
  <text x="380" y="241" font-family="Arial,sans-serif" font-size="11" fill="#92400e" text-anchor="middle">사용자 인증 동의를 위해 브라우저 열기</text>

  <line x1="380" y1="246" x2="380" y2="268" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5: local HTTP server callback -->
  <rect x="200" y="268" width="360" height="34" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="380" y="283" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="bold">로컬 HTTP 서버가 콜백 수신</text>
  <text x="380" y="297" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">buildRedirectUri + findAvailablePort</text>

  <line x1="380" y1="302" x2="380" y2="324" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 6: save tokens -->
  <rect x="200" y="324" width="360" height="34" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="380" y="339" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle" font-weight="bold">토큰을 SecureStorage에 저장</text>
  <text x="380" y="353" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">ClaudeAuthProvider.saveTokens()</text>

  <line x1="380" y1="358" x2="380" y2="380" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 7: retry -->
  <rect x="200" y="380" width="360" height="28" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="5"/>
  <text x="380" y="399" font-family="Arial,sans-serif" font-size="12" fill="#15803d" text-anchor="middle" font-weight="bold">원래 MCP 요청 재시도 (인증됨)</text>
</svg>
