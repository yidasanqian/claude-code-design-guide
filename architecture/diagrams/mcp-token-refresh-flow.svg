<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0,10 3,0 6" fill="#666"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0,10 3,0 6" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="white"/>

  <!-- Title -->
  <text x="400" y="28" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#1e40af" text-anchor="middle">MCP Token Refresh Flow</text>

  <!-- Entry box -->
  <rect x="270" y="44" width="260" height="34" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="400" y="59" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">sdkRefreshAuthorization()</text>
  <text x="400" y="73" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">use refresh_token → request new access_token</text>

  <line x1="400" y1="78" x2="400" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision diamond: success? -->
  <polygon points="400,100 480,120 400,140 320,120" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="124" font-family="Arial,sans-serif" font-size="11" fill="#92400e" text-anchor="middle">refresh success?</text>

  <!-- YES path (right) -->
  <line x1="480" y1="120" x2="580" y2="120" stroke="#16a34a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="580" y="106" width="160" height="28" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="5"/>
  <text x="660" y="118" font-family="Arial,sans-serif" font-size="12" fill="#15803d" text-anchor="middle" font-weight="bold">new access_token</text>
  <text x="660" y="130" font-family="Arial,sans-serif" font-size="11" fill="#15803d" text-anchor="middle">saved · continue</text>
  <text x="505" y="115" font-family="Arial,sans-serif" font-size="10" fill="#16a34a">YES</text>

  <!-- NO path (down) -->
  <line x1="400" y1="140" x2="400" y2="162" stroke="#666" stroke-width="2" marker-end="url(#arr)"/>
  <text x="406" y="156" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">NO — failure</text>

  <!-- Distinguish failure reason diamond -->
  <polygon points="400,162 490,182 400,202 310,182" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="179" font-family="Arial,sans-serif" font-size="11" fill="#92400e" text-anchor="middle">failure reason?</text>
  <text x="400" y="192" font-family="Arial,sans-serif" font-size="10" fill="#92400e" text-anchor="middle">classify error</text>

  <!-- Branch 1: invalid_grant (left) -->
  <line x1="310" y1="182" x2="120" y2="182" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="215" y="175" font-family="Arial,sans-serif" font-size="10" fill="#dc2626">invalid_grant</text>
  <rect x="20" y="168" width="100" height="28" fill="#fee2e2" stroke="#dc2626" stroke-width="2" rx="5"/>
  <text x="70" y="181" font-family="Arial,sans-serif" font-size="10" fill="#991b1b" text-anchor="middle">full OAuth</text>
  <text x="70" y="193" font-family="Arial,sans-serif" font-size="10" fill="#991b1b" text-anchor="middle">flow again</text>

  <!-- Branch 2: transient (right) -->
  <line x1="490" y1="182" x2="620" y2="182" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="555" y="175" font-family="Arial,sans-serif" font-size="10" fill="#92400e">transient / TooManyRequests</text>
  <rect x="620" y="168" width="150" height="28" fill="#fef9c3" stroke="#ca8a04" stroke-width="2" rx="5"/>
  <text x="695" y="181" font-family="Arial,sans-serif" font-size="10" fill="#854d0e" text-anchor="middle">retry up to 3×</text>
  <text x="695" y="193" font-family="Arial,sans-serif" font-size="10" fill="#854d0e" text-anchor="middle">(exponential backoff)</text>

  <!-- Branch 3: ServerError (down) -->
  <line x1="400" y1="202" x2="400" y2="230" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="406" y="222" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">ServerError / other</text>

  <rect x="270" y="230" width="260" height="28" fill="#f3f4f6" stroke="#9ca3af" stroke-width="2" rx="5"/>
  <text x="400" y="244" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">log and report error</text>
  <text x="400" y="256" font-family="Arial,sans-serif" font-size="11" fill="#374151" text-anchor="middle">MCPRefreshFailureReason recorded</text>

  <!-- Retry loop arrow from transient back -->
  <path d="M695 196 Q695 260 400 258" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- legend -->
  <rect x="20" y="310" width="750" height="72" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" rx="5"/>
  <text x="40" y="328" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#374151">Failure reasons (MCPRefreshFailureReason):</text>
  <text x="40" y="344" font-family="Arial,sans-serif" font-size="11" fill="#374151">• invalid_grant — token revoked/expired; triggers full re-authorization</text>
  <text x="40" y="358" font-family="Arial,sans-serif" font-size="11" fill="#374151">• TemporarilyUnavailableError / TooManyRequestsError — transient; retry max 3 times</text>
  <text x="40" y="372" font-family="Arial,sans-serif" font-size="11" fill="#374151">• metadata_discovery_failed / no_client_info / no_tokens_returned / request_failed — log and surface</text>
</svg>
