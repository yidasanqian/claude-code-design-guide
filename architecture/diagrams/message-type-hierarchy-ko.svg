<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 650">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <text x="350" y="25" font-family="Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle" font-weight="bold">메시지 타입 계층</text>

  <rect x="250" y="50" width="200" height="40" fill="#dbeafe" stroke="#2563eb" stroke-width="3" rx="5"/>
  <text x="350" y="75" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">Message (유니온 타입)</text>

  <rect x="50" y="130" width="140" height="35" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="120" y="152" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">UserMessage</text>

  <rect x="210" y="130" width="140" height="35" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="280" y="152" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">AssistantMessage</text>

  <rect x="370" y="130" width="140" height="35" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="440" y="152" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">SystemMessage</text>

  <rect x="530" y="130" width="140" height="35" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="600" y="152" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">AttachmentMessage</text>

  <rect x="50" y="190" width="140" height="35" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="120" y="212" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">TombstoneMessage</text>

  <rect x="210" y="190" width="140" height="35" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="280" y="205" font-family="Arial,sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">ToolUseSummary</text>
  <text x="280" y="218" font-family="Arial,sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">Message</text>

  <rect x="370" y="190" width="140" height="35" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="440" y="212" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">HookResultMessage</text>

  <rect x="530" y="190" width="140" height="35" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="600" y="205" font-family="Arial,sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">SystemLocal</text>
  <text x="600" y="218" font-family="Arial,sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">CommandMessage</text>

  <rect x="130" y="250" width="140" height="35" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="200" y="265" font-family="Arial,sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">SystemCompact</text>
  <text x="200" y="278" font-family="Arial,sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">BoundaryMessage</text>

  <rect x="290" y="250" width="140" height="35" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="360" y="272" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">ProgressMessage</text>

  <line x1="350" y1="90" x2="120" y2="130" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="90" x2="280" y2="130" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="90" x2="440" y2="130" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="90" x2="600" y2="130" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="90" x2="120" y2="190" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="90" x2="280" y2="190" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="90" x2="440" y2="190" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="90" x2="600" y2="190" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="90" x2="200" y2="250" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="90" x2="360" y2="250" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="50" y="320" width="600" height="120" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="60" y="340" font-family="Arial,sans-serif" font-size="12" fill="#78350f" font-weight="bold">API 메시지 (Anthropic으로 전송)</text>
  <text x="60" y="360" font-family="Arial,sans-serif" font-size="11" fill="#78350f">MessageParam = { role: 'user' | 'assistant', content: ContentBlockParam[] }</text>
  <text x="60" y="385" font-family="Arial,sans-serif" font-size="11" fill="#78350f">ContentBlockParam:</text>
  <text x="70" y="402" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• { type: 'text', text: string }</text>
  <text x="70" y="417" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• { type: 'tool_use', id, name, input }</text>
  <text x="70" y="432" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• { type: 'tool_result', tool_use_id, content, is_error? }</text>

  <text x="370" y="402" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• { type: 'image', source: {...} }</text>
  <text x="370" y="417" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• { type: 'document', source: {...} }</text>

  <rect x="50" y="470" width="600" height="160" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="5"/>
  <text x="60" y="490" font-family="Arial,sans-serif" font-size="12" fill="#14532d" font-weight="bold">StreamEvent (스트리밍)</text>
  <text x="70" y="510" font-family="Arial,sans-serif" font-size="10" fill="#14532d">• stream_request_start</text>
  <text x="70" y="525" font-family="Arial,sans-serif" font-size="10" fill="#14532d">• stream_content_block_start</text>
  <text x="70" y="540" font-family="Arial,sans-serif" font-size="10" fill="#14532d">• stream_content_block_delta</text>
  <text x="70" y="555" font-family="Arial,sans-serif" font-size="10" fill="#14532d">• stream_content_block_stop</text>

  <text x="370" y="510" font-family="Arial,sans-serif" font-size="10" fill="#14532d">• stream_message_start</text>
  <text x="370" y="525" font-family="Arial,sans-serif" font-size="10" fill="#14532d">• stream_message_delta</text>
  <text x="370" y="540" font-family="Arial,sans-serif" font-size="10" fill="#14532d">• stream_message_stop</text>
  <text x="370" y="555" font-family="Arial,sans-serif" font-size="10" fill="#14532d">• stream_end</text>

  <text x="60" y="580" font-family="Arial,sans-serif" font-size="10" fill="#14532d" font-style="italic">참고: 스트리밍 이벤트는 실시간 API 통신 중 사용됨</text>
  <text x="60" y="595" font-family="Arial,sans-serif" font-size="10" fill="#14532d" font-style="italic">AssistantMessage를 점진적으로 빌드하고 tool_use 블록을 추출하는 데 활용됨.</text>
</svg>
