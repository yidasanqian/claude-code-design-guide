<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <rect x="250" y="20" width="200" height="40" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="350" y="45" font-family="Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle" font-weight="bold">사용자 입력</text>

  <rect x="250" y="90" width="200" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="350" y="115" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">UserMessage</text>

  <rect x="250" y="160" width="200" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="350" y="185" font-family="Arial,sans-serif" font-size="13" fill="#78350f" text-anchor="middle">[Claude 처리 중]</text>

  <rect x="250" y="240" width="200" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="350" y="265" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">AssistantMessage</text>

  <rect x="50" y="320" width="180" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="140" y="345" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">ToolUseSummaryMessage</text>

  <rect x="260" y="320" width="180" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="350" y="345" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">HookResultMessage</text>

  <rect x="470" y="320" width="180" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="560" y="345" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">ProgressMessage</text>

  <rect x="250" y="400" width="200" height="40" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="5"/>
  <text x="350" y="425" font-family="Arial,sans-serif" font-size="13" fill="#14532d" text-anchor="middle">AssistantMessage (최종)</text>

  <text x="50" y="490" font-family="Arial,sans-serif" font-size="11" fill="#666" font-weight="bold">보조 메시지:</text>
  <text x="50" y="510" font-family="Arial,sans-serif" font-size="10" fill="#666">• SystemMessage (시스템 알림)</text>
  <text x="50" y="525" font-family="Arial,sans-serif" font-size="10" fill="#666">• AttachmentMessage (첨부파일)</text>
  <text x="50" y="540" font-family="Arial,sans-serif" font-size="10" fill="#666">• TombstoneMessage (삭제된 자리표시자)</text>

  <text x="400" y="490" font-family="Arial,sans-serif" font-size="10" fill="#666">• SystemLocalCommandMessage</text>
  <text x="400" y="505" font-family="Arial,sans-serif" font-size="10" fill="#666">• SystemCompactBoundaryMessage</text>

  <line x1="350" y1="60" x2="350" y2="90" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="130" x2="350" y2="160" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="210" x2="350" y2="240" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <line x1="350" y1="280" x2="140" y2="320" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="280" x2="350" y2="320" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="280" x2="560" y2="320" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <line x1="140" y1="360" x2="350" y2="400" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="360" x2="350" y2="400" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="560" y1="360" x2="350" y2="400" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
</svg>
