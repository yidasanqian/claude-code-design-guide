<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <text x="375" y="25" font-family="Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle" font-weight="bold">Multi-Agent Communication Flow</text>

  <rect x="275" y="45" width="200" height="50" fill="#dbeafe" stroke="#2563eb" stroke-width="3" rx="5"/>
  <text x="375" y="70" font-family="Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle" font-weight="bold">Primary Agent</text>
  <text x="375" y="87" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">(coordinator)</text>

  <rect x="50" y="140" width="160" height="60" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="130" y="162" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">AgentTool (sync)</text>
  <text x="130" y="180" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">block for result</text>

  <rect x="240" y="140" width="160" height="60" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="320" y="162" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">AgentTool</text>
  <text x="320" y="178" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">(run_in_background)</text>
  <text x="320" y="193" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">returns taskId</text>

  <rect x="430" y="140" width="160" height="60" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="510" y="162" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">AgentTool (team)</text>
  <text x="510" y="178" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">worktree isolation</text>

  <rect x="240" y="240" width="160" height="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="320" y="265" font-family="Arial,sans-serif" font-size="11" fill="#78350f" text-anchor="middle">TaskGetTool polls</text>

  <rect x="430" y="240" width="160" height="60" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="510" y="262" font-family="Arial,sans-serif" font-size="10" fill="#78350f" text-anchor="middle">• AbortController</text>
  <text x="510" y="278" font-family="Arial,sans-serif" font-size="10" fill="#78350f" text-anchor="middle">• env inherit (17 vars)</text>
  <text x="510" y="294" font-family="Arial,sans-serif" font-size="10" fill="#78350f" text-anchor="middle">• permission sync</text>

  <rect x="50" y="340" width="160" height="60" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="130" y="362" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">SendMessageTool</text>
  <text x="130" y="378" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">to: "teammate-name"</text>
  <text x="130" y="393" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">→ file mailbox</text>

  <rect x="240" y="340" width="160" height="60" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="320" y="362" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">SendMessageTool</text>
  <text x="320" y="378" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">to: "*"</text>
  <text x="320" y="393" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">→ broadcast all</text>

  <rect x="430" y="340" width="160" height="60" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="510" y="362" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">SendMessageTool</text>
  <text x="510" y="378" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">to: "uds:socket"</text>
  <text x="510" y="393" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">→ Unix Domain Socket</text>

  <rect x="250" y="450" width="300" height="80" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="5"/>
  <text x="400" y="475" font-family="Arial,sans-serif" font-size="12" fill="#14532d" text-anchor="middle" font-weight="bold">Remote Agents</text>
  <text x="260" y="495" font-family="Arial,sans-serif" font-size="10" fill="#14532d">AgentTool (isolation: remote)</text>
  <text x="260" y="510" font-family="Arial,sans-serif" font-size="10" fill="#14532d">→ CCR environment → Bridge protocol</text>
  <text x="260" y="525" font-family="Arial,sans-serif" font-size="10" fill="#14532d">  REST createBridgeSession() + WebSocket</text>

  <line x1="375" y1="95" x2="130" y2="140" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="95" x2="320" y2="140" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="95" x2="510" y2="140" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="95" x2="130" y2="340" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="95" x2="320" y2="340" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="95" x2="510" y2="340" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="320" y1="200" x2="320" y2="240" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="510" y1="200" x2="510" y2="240" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
</svg>
