<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" font-family="Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e40af">권한 전파 — 버블 모드</text>

  <!-- User box -->
  <rect x="40" y="55" width="130" height="50" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="105" y="77" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">사용자</text>
  <text x="105" y="96" text-anchor="middle" font-size="11" fill="#374151">(UI / 터미널 보유)</text>

  <!-- Parent Agent box -->
  <rect x="255" y="55" width="170" height="50" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="77" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">부모 에이전트</text>
  <text x="340" y="96" text-anchor="middle" font-size="11" fill="#374151">toolPermissionContext</text>

  <!-- Sub-agent box -->
  <rect x="510" y="55" width="140" height="50" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="580" y="77" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">하위 에이전트</text>
  <text x="580" y="96" text-anchor="middle" font-size="11" fill="#374151">(UI 없음)</text>

  <!-- Sub-agent → Parent: permission request bubbles -->
  <line x1="510" y1="80" x2="425" y2="80" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="467" y="72" text-anchor="middle" font-size="11" fill="#666">권한</text>
  <text x="467" y="85" text-anchor="middle" font-size="11" fill="#666">요청 버블</text>

  <!-- Parent → User: bubble -->
  <line x1="255" y1="80" x2="170" y2="80" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="212" y="72" text-anchor="middle" font-size="11" fill="#666">버블</text>

  <!-- Downward arrow under parent -->
  <line x1="340" y1="105" x2="340" y2="145" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- toolPermissionContext controls box -->
  <rect x="180" y="145" width="320" height="38" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="340" y="164" text-anchor="middle" font-size="13" fill="#92400e">toolPermissionContext 제어 항목</text>
  <text x="340" y="179" text-anchor="middle" font-size="11" fill="#92400e">canShowPermissionPrompts · runHooks · logDecision</text>

  <!-- Permission modes section -->
  <line x1="340" y1="183" x2="340" y2="213" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="60" y="213" width="560" height="100" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="234" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">권한 모드 결정</text>

  <!-- bubble mode -->
  <rect x="75" y="245" width="155" height="56" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="152" y="263" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">버블 모드</text>
  <text x="152" y="278" text-anchor="middle" font-size="11" fill="#374151">요청이 항상</text>
  <text x="152" y="291" text-anchor="middle" font-size="11" fill="#374151">부모 UI로 버블</text>

  <!-- acceptEdits mode -->
  <rect x="262" y="245" width="155" height="56" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="339" y="263" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">acceptEdits 모드</text>
  <text x="339" y="278" text-anchor="middle" font-size="11" fill="#374151">워커 기본값</text>
  <text x="339" y="291" text-anchor="middle" font-size="11" fill="#374151">편집 자동 승인</text>

  <!-- bypassPermissions -->
  <rect x="450" y="245" width="155" height="56" rx="4" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="527" y="263" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">bypassPermissions</text>
  <text x="527" y="278" text-anchor="middle" font-size="11" fill="#374151">부모 모드</text>
  <text x="527" y="291" text-anchor="middle" font-size="11" fill="#374151">재정의 불가</text>

  <!-- Note -->
  <rect x="110" y="330" width="460" height="50" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="340" y="350" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400e">보안: 하위 에이전트는 권한 결정 불가</text>
  <text x="340" y="368" text-anchor="middle" font-size="11" fill="#92400e">cliArg 규칙 (--allowedTools)은 항상 유지 · runAgent.ts:466</text>
</svg>
