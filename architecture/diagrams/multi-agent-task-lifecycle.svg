<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" font-family="Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e40af">Task Lifecycle State Machine</text>

  <!-- pending -->
  <rect x="265" y="50" width="150" height="42" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="71" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">pending</text>
  <text x="340" y="87" text-anchor="middle" font-size="11" fill="#374151">registerAsyncAgent()</text>

  <!-- pending → running -->
  <line x1="340" y1="92" x2="340" y2="138" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="352" y="118" font-size="11" fill="#666">start</text>

  <!-- running -->
  <rect x="245" y="138" width="190" height="50" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="160" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">running</text>
  <text x="340" y="176" text-anchor="middle" font-size="11" fill="#374151">updateAsyncAgentProgress()</text>

  <!-- running self-loop -->
  <path d="M 435 163 Q 480 130 480 163 Q 480 196 435 188" fill="none" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="498" y="163" text-anchor="middle" font-size="11" fill="#666">progress</text>
  <text x="498" y="176" text-anchor="middle" font-size="11" fill="#666">update</text>

  <!-- running → completed -->
  <line x1="265" y1="163" x2="140" y2="248" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="185" y="213" font-size="11" fill="#666">success</text>

  <!-- running → failed -->
  <line x1="340" y1="188" x2="340" y2="258" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="352" y="228" font-size="11" fill="#666">error</text>

  <!-- running → killed -->
  <line x1="435" y1="163" x2="530" y2="248" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="502" y="213" font-size="11" fill="#666">TaskStop</text>

  <!-- completed -->
  <rect x="60" y="258" width="160" height="42" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="279" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">completed</text>
  <text x="140" y="293" text-anchor="middle" font-size="11" fill="#374151">completeAsyncAgent()</text>

  <!-- failed -->
  <rect x="255" y="258" width="170" height="42" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="279" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">failed</text>
  <text x="340" y="293" text-anchor="middle" font-size="11" fill="#374151">failAsyncAgent()</text>

  <!-- killed -->
  <rect x="460" y="258" width="160" height="42" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="540" y="279" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">killed</text>
  <text x="540" y="293" text-anchor="middle" font-size="11" fill="#374151">killAsyncAgent() (idempotent)</text>

  <!-- Notification box -->
  <rect x="130" y="340" width="420" height="60" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="340" y="360" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400e">enqueueAgentNotification() — task-notification XML</text>
  <text x="340" y="378" text-anchor="middle" font-size="11" fill="#92400e">status: completed | failed | killed</text>
  <text x="340" y="393" text-anchor="middle" font-size="11" fill="#92400e">summary · result · total_tokens · tool_uses · duration_ms</text>

  <line x1="140" y1="300" x2="200" y2="340" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="300" x2="340" y2="340" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="300" x2="480" y2="340" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
