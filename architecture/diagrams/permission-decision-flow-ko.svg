<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <rect x="250" y="20" width="200" height="40" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="350" y="45" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">canUseTool(tool, input)</text>

  <rect x="50" y="90" width="150" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="125" y="110" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">[1] 규칙 매칭</text>
  <text x="125" y="128" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">(5단계 설정)</text>

  <rect x="220" y="90" width="150" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="295" y="110" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">[2] 도구별</text>
  <text x="295" y="128" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">검사</text>

  <rect x="390" y="90" width="150" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="465" y="110" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">[3] 자동 모드</text>
  <text x="465" y="128" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">분류기</text>

  <rect x="560" y="90" width="120" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="620" y="110" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">[4] 사용자</text>
  <text x="620" y="128" font-family="Arial,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">프롬프트</text>

  <rect x="50" y="170" width="150" height="80" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="3"/>
  <text x="125" y="190" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">• 허용 규칙</text>
  <text x="125" y="205" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">→ 자동 통과</text>
  <text x="125" y="225" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">• 거부 규칙</text>
  <text x="125" y="240" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">→ 자동 거절</text>

  <rect x="220" y="170" width="150" height="80" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="3"/>
  <text x="295" y="190" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">• Bash 와일드카드</text>
  <text x="295" y="205" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">• 파일 경로 검증</text>
  <text x="295" y="220" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">• 웹 호스트 목록</text>
  <text x="295" y="235" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">• MCP 권한</text>

  <rect x="390" y="170" width="150" height="80" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="3"/>
  <text x="465" y="190" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">1단계: 정규식</text>
  <text x="465" y="205" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">(빠른 경로)</text>
  <text x="465" y="225" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">2단계: AI</text>
  <text x="465" y="240" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">(느린 경로)</text>

  <rect x="560" y="170" width="120" height="80" fill="#f8fafc" stroke="#64748b" stroke-width="1" rx="3"/>
  <text x="620" y="190" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">React 다이얼로그:</text>
  <text x="620" y="205" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">• 허용</text>
  <text x="620" y="220" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">• 거부</text>
  <text x="620" y="235" font-family="Arial,sans-serif" font-size="10" fill="#475569" text-anchor="middle">• 항상 허용</text>

  <rect x="200" y="280" width="300" height="50" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="5"/>
  <text x="350" y="305" font-family="Arial,sans-serif" font-size="12" fill="#14532d" text-anchor="middle">반환: {behavior, message?,</text>
  <text x="350" y="320" font-family="Arial,sans-serif" font-size="12" fill="#14532d" text-anchor="middle">suggestions?, decisionReason?}</text>

  <line x1="350" y1="60" x2="125" y2="90" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="60" x2="295" y2="90" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="60" x2="465" y2="90" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="60" x2="620" y2="90" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <line x1="125" y1="250" x2="350" y2="280" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="295" y1="250" x2="350" y2="280" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="465" y1="250" x2="350" y2="280" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="620" y1="250" x2="350" y2="280" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="50" y="360" width="600" height="220" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="60" y="385" font-family="Arial,sans-serif" font-size="12" fill="#78350f" font-weight="bold">권한 요청 유형:</text>

  <text x="70" y="410" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• BashPermissionRequest</text>
  <text x="70" y="430" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• FileEditPermissionRequest</text>
  <text x="70" y="450" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• FileWritePermissionRequest</text>
  <text x="70" y="470" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• WebFetchPermissionRequest</text>
  <text x="70" y="490" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• PowerShellPermissionRequest</text>

  <text x="350" y="410" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• NotebookEditPermissionRequest</text>
  <text x="350" y="430" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• SkillPermissionRequest</text>
  <text x="350" y="450" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• AskUserQuestionPermissionRequest</text>
  <text x="350" y="470" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• EnterPlanModePermissionRequest</text>
  <text x="350" y="490" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• FallbackPermissionRequest</text>

  <text x="60" y="525" font-family="Arial,sans-serif" font-size="11" fill="#78350f" font-weight="bold">보안 계층:</text>
  <text x="70" y="545" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• 경로 검증 + 심볼릭 링크 확인 + UNC 안전성 (파일 도구)</text>
  <text x="70" y="565" font-family="Arial,sans-serif" font-size="10" fill="#78350f">• 30개 gitleaks 규칙 적용 시크릿 스캐너 (TeamMem 도구)</text>
</svg>
