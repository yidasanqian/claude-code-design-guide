<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <rect x="200" y="20" width="200" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="300" y="50" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">.proto definition files</text>

  <rect x="200" y="100" width="200" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="300" y="120" font-family="Arial,sans-serif" font-size="12" fill="#78350f" text-anchor="middle">protoc compiler +</text>
  <text x="300" y="138" font-family="Arial,sans-serif" font-size="12" fill="#78350f" text-anchor="middle">ts-proto plugin</text>

  <rect x="200" y="180" width="200" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="300" y="205" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">types/generated/**/*.ts</text>

  <rect x="200" y="260" width="200" height="50" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="5"/>
  <text x="300" y="280" font-family="Arial,sans-serif" font-size="12" fill="#14532d" text-anchor="middle">Application code import</text>
  <text x="300" y="298" font-family="Arial,sans-serif" font-size="11" fill="#14532d" text-anchor="middle">(read-only reference)</text>

  <line x1="300" y1="70" x2="300" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="150" x2="300" y2="180" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="230" x2="300" y2="260" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <text x="50" y="350" font-family="Arial,sans-serif" font-size="11" fill="#dc2626" font-weight="bold">⚠ Warning:</text>
  <text x="50" y="370" font-family="Arial,sans-serif" font-size="10" fill="#666">Files under types/generated/ are auto-generated by the build pipeline.</text>
  <text x="50" y="385" font-family="Arial,sans-serif" font-size="10" fill="#666">Any manual modifications will be overwritten on the next build.</text>
</svg>
