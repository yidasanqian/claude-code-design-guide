<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
  </defs>

  <text x="450" y="30" font-family="Arial,sans-serif" font-size="16" fill="#1e40af" text-anchor="middle" font-weight="bold">权限桥接流程</text>

  <!-- CCR Server -->
  <rect x="30" y="80" width="160" height="80" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="110" y="110" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">CCR Server</text>
  <text x="110" y="130" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">(远程)</text>
  <text x="110" y="150" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">权限请求</text>

  <!-- Arrow to bridge -->
  <path d="M 190 120 L 330 120" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="260" y="110" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">WebSocket</text>

  <!-- Bridge container -->
  <rect x="330" y="50" width="350" height="420" fill="none" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="505" y="75" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">remotePermissionBridge</text>

  <!-- Step 1: Convert -->
  <rect x="360" y="100" width="290" height="60" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="505" y="130" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">转换为本地格式</text>

  <path d="M 505 160 L 505 210" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Local handler -->
  <rect x="360" y="210" width="290" height="80" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="505" y="240" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">本地权限处理器</text>
  <text x="505" y="260" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">(UI提示/自动策略)</text>

  <path d="M 505 290 L 505 350" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Collect decision -->
  <rect x="360" y="350" width="290" height="60" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="505" y="385" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">收集决策</text>

  <path d="M 505 410 L 505 450" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Arrow out to CCR Response -->
  <path d="M 505 450 L 505 490 L 750 490 L 750 430" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="640" y="485" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">HTTP POST</text>

  <!-- CCR Server Response -->
  <rect x="680" y="350" width="190" height="80" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="775" y="385" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">CCR Server</text>
  <text x="775" y="405" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">(响应)</text>
</svg>