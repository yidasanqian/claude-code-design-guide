<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <rect x="200" y="20" width="200" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="300" y="45" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">App.tsx (entry point)</text>

  <rect x="200" y="90" width="200" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="300" y="115" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">AppStateProvider</text>

  <rect x="200" y="160" width="200" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="300" y="185" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">StatsProvider</text>

  <rect x="200" y="230" width="200" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="300" y="255" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">FpsMetricsProvider</text>

  <rect x="50" y="310" width="150" height="60" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="125" y="335" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">REPL.tsx</text>
  <text x="125" y="355" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">(main interaction)</text>

  <rect x="225" y="310" width="150" height="60" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="300" y="335" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">Doctor.tsx</text>
  <text x="300" y="355" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">(diagnostics)</text>

  <rect x="400" y="310" width="150" height="60" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="475" y="335" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">ResumeConversation</text>
  <text x="475" y="355" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">(restoration)</text>

  <line x1="300" y1="60" x2="300" y2="90" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="130" x2="300" y2="160" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="200" x2="300" y2="230" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <line x1="300" y1="270" x2="125" y2="310" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="270" x2="300" y2="310" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="300" y1="270" x2="475" y2="310" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <text x="125" y="400" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">• Message stream</text>
  <text x="125" y="415" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">• Tool execution</text>
  <text x="125" y="430" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">• Progress indication</text>
  <text x="125" y="445" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">• Input handling</text>

  <text x="300" y="400" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">• Node version</text>
  <text x="300" y="415" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">• API connection</text>
  <text x="300" y="430" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">• Sandbox status</text>
  <text x="300" y="445" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">• MCP servers</text>

  <text x="475" y="400" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">• Message history</text>
  <text x="475" y="415" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">• Session selection</text>
</svg>
