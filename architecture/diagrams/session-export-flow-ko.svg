<svg xmlns="http://www.w3.org/2000/svg" width="420" height="250" viewBox="0 0 420 250">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- /export command -->
  <rect x="145" y="10" width="130" height="36" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="210" y="28" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="14" font-weight="bold">/export</text>
  <text x="210" y="42" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">사용자 명령어</text>

  <!-- Arrow down -->
  <line x1="210" y1="46" x2="210" y2="76" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Export session record box -->
  <rect x="60" y="79" width="300" height="40" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="210" y="96" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="13" font-weight="bold">현재 세션 대화 내보내기</text>
  <text x="210" y="113" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">전체 메시지 히스토리</text>

  <!-- Branch -->
  <line x1="140" y1="119" x2="140" y2="148" stroke="#666" stroke-width="2"/>
  <line x1="280" y1="119" x2="280" y2="148" stroke="#666" stroke-width="2"/>
  <line x1="140" y1="148" x2="280" y2="148" stroke="#666" stroke-width="2"/>
  <line x1="140" y1="148" x2="100" y2="168" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="280" y1="148" x2="320" y2="168" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- JSON format -->
  <rect x="20" y="171" width="160" height="50" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="100" y="192" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">JSON 형식</text>
  <text x="100" y="210" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">구조화된 출력</text>
  <text x="100" y="215" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">프로그래밍 방식 사용</text>

  <!-- Markdown format -->
  <rect x="240" y="171" width="160" height="50" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="192" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">마크다운 형식</text>
  <text x="320" y="210" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">사람이 읽기 쉬운</text>
  <text x="320" y="215" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">검토 / 공유용</text>

  <text x="210" y="248" text-anchor="middle" font-family="Arial,sans-serif" fill="#666" font-size="11">사용자 시작 전용 — 자동 동기화 없음</text>
</svg>
