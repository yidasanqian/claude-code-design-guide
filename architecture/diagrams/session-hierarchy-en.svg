<svg xmlns="http://www.w3.org/2000/svg" width="520" height="280" viewBox="0 0 520 280">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Session A -->
  <rect x="175" y="10" width="170" height="40" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="260" y="28" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="13" font-weight="bold">Session A</text>
  <text x="260" y="44" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">(initial session)</text>

  <!-- Line down and split -->
  <line x1="215" y1="50" x2="215" y2="85" stroke="#666" stroke-width="2"/>
  <line x1="305" y1="50" x2="305" y2="85" stroke="#666" stroke-width="2"/>
  <line x1="215" y1="85" x2="305" y2="85" stroke="#666" stroke-width="2"/>
  <line x1="215" y1="85" x2="100" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="305" y1="85" x2="400" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Session B -->
  <rect x="20" y="112" width="160" height="48" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="100" y="132" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">Session B</text>
  <text x="100" y="148" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">resume → regenerate</text>
  <text x="100" y="160" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">parent = A</text>

  <!-- Session C -->
  <rect x="325" y="112" width="170" height="48" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="410" y="132" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">Session C</text>
  <text x="410" y="148" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">agent spawn</text>
  <text x="410" y="160" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">parent = A</text>

  <!-- Arrow from C down to D -->
  <line x1="410" y1="160" x2="410" y2="195" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Session D -->
  <rect x="325" y="198" width="170" height="48" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="410" y="218" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">Session D</text>
  <text x="410" y="234" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">resume inside agent</text>
  <text x="410" y="246" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">parent = C</text>

  <!-- Legend -->
  <text x="20" y="270" font-family="Arial,sans-serif" fill="#666" font-size="11">Each UUID session tracks parent lineage for full traceability</text>
</svg>
