<svg xmlns="http://www.w3.org/2000/svg" width="520" height="280" viewBox="0 0 520 280">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Session A -->
  <rect x="175" y="10" width="170" height="40" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="260" y="28" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="13" font-weight="bold">세션 A</text>
  <text x="260" y="44" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">(최초 세션)</text>

  <!-- Line down and split -->
  <line x1="215" y1="50" x2="215" y2="85" stroke="#666" stroke-width="2"/>
  <line x1="305" y1="50" x2="305" y2="85" stroke="#666" stroke-width="2"/>
  <line x1="215" y1="85" x2="305" y2="85" stroke="#666" stroke-width="2"/>
  <line x1="215" y1="85" x2="100" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="305" y1="85" x2="400" y2="110" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Session B -->
  <rect x="20" y="112" width="160" height="48" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="100" y="132" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">세션 B</text>
  <text x="100" y="148" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">재개 → 재생성</text>
  <text x="100" y="160" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">부모 = A</text>

  <!-- Session C -->
  <rect x="325" y="112" width="170" height="48" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="410" y="132" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">세션 C</text>
  <text x="410" y="148" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">에이전트 스폰</text>
  <text x="410" y="160" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">부모 = A</text>

  <!-- Arrow from C down to D -->
  <line x1="410" y1="160" x2="410" y2="195" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Session D -->
  <rect x="325" y="198" width="170" height="48" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="410" y="218" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">세션 D</text>
  <text x="410" y="234" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">에이전트 내부 재개</text>
  <text x="410" y="246" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">부모 = C</text>

  <!-- Legend -->
  <text x="20" y="270" font-family="Arial,sans-serif" fill="#666" font-size="11">각 UUID 세션은 완전한 추적을 위해 부모 계보를 기록</text>
</svg>
