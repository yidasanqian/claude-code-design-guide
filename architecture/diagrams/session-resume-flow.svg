<svg xmlns="http://www.w3.org/2000/svg" width="520" height="380" viewBox="0 0 520 380">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Two entry points at top -->
  <rect x="20" y="10" width="175" height="40" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="108" y="28" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">User selects "resume"</text>
  <text x="108" y="44" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">from UI session list</text>

  <rect x="220" y="10" width="175" height="40" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="308" y="28" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">CLI --resume flag</text>
  <text x="308" y="44" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">claude --resume &lt;id&gt;</text>

  <!-- Merge lines -->
  <line x1="108" y1="50" x2="108" y2="75" stroke="#666" stroke-width="2"/>
  <line x1="308" y1="50" x2="308" y2="75" stroke="#666" stroke-width="2"/>
  <line x1="108" y1="75" x2="308" y2="75" stroke="#666" stroke-width="2"/>
  <line x1="208" y1="75" x2="208" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- useTeleportResume() -->
  <rect x="80" y="103" width="256" height="42" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="208" y="122" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="13" font-weight="bold">useTeleportResume()</text>
  <text x="208" y="139" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">state consistency check</text>

  <!-- Arrow down -->
  <line x1="208" y1="145" x2="208" y2="172" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ResumeConversation.tsx -->
  <rect x="80" y="175" width="256" height="42" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="208" y="195" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="13" font-weight="bold">ResumeConversation.tsx</text>
  <text x="208" y="211" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">React component orchestrator</text>

  <!-- Three branches down from ResumeConversation -->
  <line x1="130" y1="217" x2="130" y2="247" stroke="#666" stroke-width="2"/>
  <line x1="208" y1="217" x2="208" y2="247" stroke="#666" stroke-width="2"/>
  <line x1="290" y1="217" x2="290" y2="247" stroke="#666" stroke-width="2"/>
  <line x1="130" y1="247" x2="130" y2="262" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="208" y1="247" x2="208" y2="262" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="290" y1="247" x2="290" y2="262" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Load Messages -->
  <rect x="30" y="265" width="190" height="42" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="125" y="283" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">Load Messages</text>
  <text x="125" y="300" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">from JSONL history</text>

  <!-- Restore Cost -->
  <rect x="158" y="265" width="100" height="42" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="208" y="283" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">Restore Cost</text>
  <text x="208" y="300" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">costState JSON</text>

  <!-- Rebuild Context -->
  <rect x="200" y="265" width="190" height="42" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="295" y="283" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">Rebuild Context</text>
  <text x="295" y="300" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">messages array + tools</text>

  <!-- Merge and arrow to Resume Complete -->
  <line x1="125" y1="307" x2="125" y2="332" stroke="#666" stroke-width="2"/>
  <line x1="208" y1="307" x2="208" y2="332" stroke="#666" stroke-width="2"/>
  <line x1="295" y1="307" x2="295" y2="332" stroke="#666" stroke-width="2"/>
  <line x1="125" y1="332" x2="295" y2="332" stroke="#666" stroke-width="2"/>
  <line x1="208" y1="332" x2="208" y2="352" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Resume Complete -->
  <rect x="120" y="355" width="176" height="18" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="208" y="368" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">Resume Complete</text>
</svg>
