<svg xmlns="http://www.w3.org/2000/svg" width="380" height="260" viewBox="0 0 380 260">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- /share command -->
  <rect x="130" y="10" width="120" height="36" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="190" y="28" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="14" font-weight="bold">/share</text>
  <text x="190" y="42" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="10">user command</text>

  <!-- Arrow down -->
  <line x1="190" y1="46" x2="190" y2="76" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Generate snapshot -->
  <rect x="50" y="79" width="280" height="42" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="190" y="99" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="13" font-weight="bold">Generate shareable session snapshot</text>
  <text x="190" y="115" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">captures full conversation state</text>

  <!-- Arrow down -->
  <line x1="190" y1="121" x2="190" y2="151" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Upload to server -->
  <rect x="50" y="154" width="280" height="42" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="190" y="174" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="13" font-weight="bold">Upload to server</text>
  <text x="190" y="190" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="11">user-initiated, not auto-sync</text>

  <!-- Arrow down -->
  <line x1="190" y1="196" x2="190" y2="226" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Return share link -->
  <rect x="80" y="229" width="220" height="22" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text x="190" y="244" text-anchor="middle" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold">Return shareable link</text>
</svg>
