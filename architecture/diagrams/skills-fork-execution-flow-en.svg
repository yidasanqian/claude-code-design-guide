<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 560" font-family="Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e40af">SkillTool Fork Context Execution Flow</text>

  <!-- SkillTool.call -->
  <rect x="215" y="45" width="250" height="38" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="64" text-anchor="middle" font-size="13" fill="#1e40af">SkillTool.call(</text>
  <text x="340" y="78" text-anchor="middle" font-size="12" fill="#374151">{ skill: string, args?: string })</text>

  <line x1="340" y1="83" x2="340" y2="108" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- findCommand -->
  <rect x="215" y="108" width="250" height="36" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="127" text-anchor="middle" font-size="13" fill="#1e40af">findCommand(skillName)</text>
  <text x="340" y="141" text-anchor="middle" font-size="11" fill="#374151">look up skill in registry</text>

  <line x1="340" y1="144" x2="340" y2="169" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- getPromptForCommand -->
  <rect x="195" y="169" width="290" height="36" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="188" text-anchor="middle" font-size="13" fill="#1e40af">getPromptForCommand(args, context)</text>
  <text x="340" y="202" text-anchor="middle" font-size="11" fill="#374151">generate skill prompt content</text>

  <line x1="340" y1="205" x2="340" y2="230" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- prepareForkedCommandContext -->
  <rect x="175" y="230" width="330" height="78" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="250" text-anchor="middle" font-size="13" fill="#1e40af">prepareForkedCommandContext()</text>
  <!-- sub-items -->
  <line x1="210" y1="262" x2="230" y2="262" stroke="#374151" stroke-width="1.5"/>
  <text x="235" y="266" font-size="12" fill="#374151">createCacheSafeParams()</text>
  <line x1="210" y1="281" x2="230" y2="281" stroke="#374151" stroke-width="1.5"/>
  <text x="235" y="285" font-size="12" fill="#374151">createSubagentContext()</text>
  <text x="235" y="300" font-size="11" fill="#6b7280">fresh message history + isolated context</text>

  <line x1="340" y1="308" x2="340" y2="333" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- runAgent -->
  <rect x="175" y="333" width="330" height="88" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="353" text-anchor="middle" font-size="13" fill="#1e40af">runAgent() — isolated sub-agent</text>
  <line x1="210" y1="365" x2="230" y2="365" stroke="#374151" stroke-width="1.5"/>
  <text x="235" y="369" font-size="12" fill="#374151">Independent token budget</text>
  <line x1="210" y1="384" x2="230" y2="384" stroke="#374151" stroke-width="1.5"/>
  <text x="235" y="388" font-size="12" fill="#374151">Independent message history</text>
  <line x1="210" y1="403" x2="230" y2="403" stroke="#374151" stroke-width="1.5"/>
  <text x="235" y="407" font-size="12" fill="#374151">Independent query depth tracking</text>

  <line x1="340" y1="421" x2="340" y2="446" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- recordSkillUsage -->
  <rect x="215" y="446" width="250" height="36" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="465" text-anchor="middle" font-size="13" fill="#1e40af">recordSkillUsage(skillName)</text>
  <text x="340" y="479" text-anchor="middle" font-size="11" fill="#374151">debounce 60s · write usage stats</text>

  <line x1="340" y1="482" x2="340" y2="507" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- extractResultText -->
  <rect x="215" y="507" width="250" height="36" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="526" text-anchor="middle" font-size="13" fill="#1e40af">extractResultText()</text>
  <text x="340" y="540" text-anchor="middle" font-size="11" fill="#374151">return result to main conversation</text>
</svg>
