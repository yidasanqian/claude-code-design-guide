<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 530" font-family="Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e40af">skillChangeDetector — 감시 &amp; 리로드 흐름</text>

  <!-- skillChangeDetector() -->
  <rect x="215" y="45" width="250" height="36" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="68" text-anchor="middle" font-size="13" fill="#1e40af">skillChangeDetector()</text>

  <line x1="340" y1="81" x2="340" y2="106" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Get skill dirs -->
  <rect x="195" y="106" width="290" height="36" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="125" text-anchor="middle" font-size="13" fill="#1e40af">모든 스킬 디렉토리 경로 가져오기</text>
  <text x="340" y="139" text-anchor="middle" font-size="11" fill="#374151">프로젝트 / 사용자 / --add-dir</text>

  <line x1="340" y1="142" x2="340" y2="167" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- chokidar.watch -->
  <rect x="155" y="167" width="370" height="38" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="186" text-anchor="middle" font-size="13" fill="#1e40af">chokidar.watch(paths,</text>
  <text x="340" y="200" text-anchor="middle" font-size="11" fill="#374151">{ usePolling: USE_POLLING, interval: 2000, depth: 2 })</text>

  <line x1="340" y1="205" x2="340" y2="230" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- File event -->
  <rect x="195" y="230" width="290" height="38" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="340" y="249" text-anchor="middle" font-size="13" fill="#92400e">on('add' / 'change' / 'unlink')</text>
  <text x="340" y="263" text-anchor="middle" font-size="11" fill="#92400e">pendingChangedPaths.add(path)</text>

  <line x1="340" y1="268" x2="340" y2="293" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Debounce -->
  <rect x="195" y="293" width="290" height="36" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="312" text-anchor="middle" font-size="13" fill="#1e40af">RELOAD_DEBOUNCE_MS = 300ms</text>
  <text x="340" y="326" text-anchor="middle" font-size="11" fill="#374151">빠른 연속 변경 디바운스</text>

  <line x1="340" y1="329" x2="340" y2="354" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stability wait -->
  <rect x="165" y="354" width="350" height="36" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="373" text-anchor="middle" font-size="13" fill="#1e40af">FILE_STABILITY_THRESHOLD_MS = 1000ms</text>
  <text x="340" y="387" text-anchor="middle" font-size="11" fill="#374151">파일 쓰기 완료 대기</text>

  <line x1="340" y1="390" x2="340" y2="415" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Trigger reload -->
  <rect x="140" y="415" width="400" height="98" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="435" text-anchor="middle" font-size="13" fill="#1e40af">리로드 트리거</text>
  <line x1="175" y1="447" x2="195" y2="447" stroke="#374151" stroke-width="1.5"/>
  <text x="200" y="451" font-size="12" fill="#374151">clearSkillCaches() · clearCommandsCache()</text>
  <line x1="175" y1="464" x2="195" y2="464" stroke="#374151" stroke-width="1.5"/>
  <text x="200" y="468" font-size="12" fill="#374151">clearCommandMemoizationCaches()</text>
  <line x1="175" y1="481" x2="195" y2="481" stroke="#374151" stroke-width="1.5"/>
  <text x="200" y="485" font-size="12" fill="#374151">resetSentSkillNames()</text>
  <line x1="175" y1="498" x2="195" y2="498" stroke="#374151" stroke-width="1.5"/>
  <text x="200" y="502" font-size="12" fill="#374151">executeConfigChangeHooks() · skillsChanged.notify()</text>

  <!-- Bun polling note -->
  <rect x="490" y="167" width="175" height="62" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="577" y="184" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Bun 환경:</text>
  <text x="577" y="199" text-anchor="middle" font-size="11" fill="#92400e">USE_POLLING = true</text>
  <text x="577" y="213" text-anchor="middle" font-size="11" fill="#92400e">stat() 폴링 (bun#27469</text>
  <text x="577" y="227" text-anchor="middle" font-size="11" fill="#92400e">교착 상태 우회)</text>
  <line x1="490" y1="198" x2="465" y2="190" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
