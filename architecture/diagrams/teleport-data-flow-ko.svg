<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="100" y="20" width="300" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="250" y="45" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" text-anchor="middle">사용자가 Teleport 시작</text>
  <line x1="250" y1="60" x2="250" y2="85" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2 -->
  <rect x="80" y="85" width="340" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="250" y="110" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold" text-anchor="middle">[환경 선택]</text>
  <text x="250" y="125" font-family="Arial,sans-serif" fill="#666" font-size="10" text-anchor="middle">getEnvironmentSelectionInfo()</text>
  <line x1="250" y1="135" x2="250" y2="160" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3 -->
  <rect x="60" y="160" width="380" height="100" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="250" y="185" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold" text-anchor="middle">[Git 번들 생성]</text>
  <text x="250" y="205" font-family="Arial,sans-serif" fill="#666" font-size="10" text-anchor="middle">createAndUploadGitBundle()</text>
  <text x="80" y="225" font-family="Arial,sans-serif" fill="#666" font-size="10">• _bundleWithFallback()</text>
  <text x="80" y="240" font-family="Arial,sans-serif" fill="#666" font-size="10">• 스태시 캡처 (refs/seed/stash)</text>
  <text x="80" y="255" font-family="Arial,sans-serif" fill="#666" font-size="10">• /v1/files 업로드</text>
  <line x1="250" y1="260" x2="250" y2="285" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4 -->
  <rect x="60" y="285" width="380" height="60" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="250" y="310" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold" text-anchor="middle">[원격 세션 생성]</text>
  <text x="250" y="330" font-family="Arial,sans-serif" fill="#666" font-size="10" text-anchor="middle">fetchSession() / sendEventToRemoteSession()</text>
  <line x1="250" y1="345" x2="250" y2="370" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 5 -->
  <rect x="80" y="370" width="340" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="250" y="395" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold" text-anchor="middle">[Ultraplan 모니터링]</text>
  <text x="250" y="410" font-family="Arial,sans-serif" fill="#666" font-size="10" text-anchor="middle">pollForApprovedExitPlanMode()</text>
  <line x1="250" y1="420" x2="250" y2="445" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 6 -->
  <rect x="60" y="445" width="380" height="60" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="250" y="470" font-family="Arial,sans-serif" fill="#1e40af" font-size="12" font-weight="bold" text-anchor="middle">[상태 전환]</text>
  <text x="250" y="490" font-family="Arial,sans-serif" fill="#666" font-size="10" text-anchor="middle">승인 / 거절 / teleport / 종료</text>
</svg>
