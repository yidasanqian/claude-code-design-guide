<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
    <style>
      .step { fill: #f0f4f8; stroke: #2563eb; stroke-width: 2; }
      .step-text { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #1e40af; }
      .desc-text { font-family: Arial, sans-serif; font-size: 10px; fill: #475569; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .title { font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; fill: #1e293b; }
      .decision { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
    </style>
  </defs>

  <text x="550" y="30" class="title" text-anchor="middle">도구 실행 데이터 흐름</text>

  <!-- Start -->
  <rect x="400" y="60" width="300" height="50" class="step" rx="5"/>
  <text x="550" y="90" class="step-text" text-anchor="middle">query.ts가 tool_use 블록 감지</text>

  <line x1="550" y1="110" x2="550" y2="140" class="arrow"/>

  <!-- Step 1 -->
  <rect x="400" y="140" width="300" height="60" class="step" rx="5"/>
  <text x="550" y="165" class="step-text" text-anchor="middle">1단계: 도구 조회</text>
  <text x="550" y="180" class="desc-text" text-anchor="middle">tools.ts 레지스트리에서 도구 정의 탐색</text>
  <text x="550" y="192" class="desc-text" text-anchor="middle">isEnabled() 확인</text>

  <line x1="550" y1="200" x2="550" y2="230" class="arrow"/>

  <!-- Step 2 -->
  <rect x="400" y="230" width="300" height="60" class="step" rx="5"/>
  <text x="550" y="255" class="step-text" text-anchor="middle">2단계: 입력 검증</text>
  <text x="550" y="270" class="desc-text" text-anchor="middle">inputSchema (Zod)로 입력 검증</text>
  <text x="550" y="282" class="desc-text" text-anchor="middle">실패 → 오류 메시지 반환</text>

  <line x1="550" y1="290" x2="550" y2="320" class="arrow"/>

  <!-- Step 3: Permission Check (Decision) -->
  <polygon points="550,320 750,370 550,420 350,370" class="decision"/>
  <text x="550" y="365" class="step-text" text-anchor="middle">3단계: 권한 확인</text>
  <text x="550" y="380" class="desc-text" text-anchor="middle">canUseTool() 파이프라인</text>

  <!-- Denied path -->
  <line x1="350" y1="370" x2="200" y2="370" class="arrow"/>
  <rect x="50" y="345" width="150" height="50" class="step" rx="5" fill="#fee2e2" stroke="#dc2626"/>
  <text x="125" y="365" class="step-text" text-anchor="middle" fill="#dc2626">거부됨</text>
  <text x="125" y="380" class="desc-text" text-anchor="middle">권한 오류 반환</text>

  <!-- Approved path -->
  <line x1="550" y1="420" x2="550" y2="460" class="arrow"/>
  <text x="600" y="445" class="desc-text">승인됨</text>

  <!-- Step 4 -->
  <rect x="400" y="460" width="300" height="60" class="step" rx="5"/>
  <text x="550" y="485" class="step-text" text-anchor="middle">4단계: 도구 실행</text>
  <text x="550" y="500" class="desc-text" text-anchor="middle">tool.execute(input, context) 호출</text>
  <text x="550" y="512" class="desc-text" text-anchor="middle">진행 이벤트 yield → UI 업데이트</text>

  <line x1="550" y1="520" x2="550" y2="550" class="arrow"/>

  <!-- Step 5 -->
  <rect x="400" y="550" width="300" height="60" class="step" rx="5"/>
  <text x="550" y="575" class="step-text" text-anchor="middle">5단계: 결과 처리</text>
  <text x="550" y="590" class="desc-text" text-anchor="middle">tool_result 메시지로 포맷</text>
  <text x="550" y="602" class="desc-text" text-anchor="middle">toolResultBudget 적용 (&gt;20KB → 디스크)</text>

  <line x1="550" y1="610" x2="550" y2="640" class="arrow"/>

  <!-- Hooks -->
  <rect x="400" y="640" width="300" height="60" class="step" rx="5"/>
  <text x="550" y="665" class="step-text" text-anchor="middle">postSamplingHooks 실행</text>
  <text x="550" y="680" class="desc-text" text-anchor="middle">텔레메트리 로깅, 상태 업데이트</text>
  <text x="550" y="692" class="desc-text" text-anchor="middle">사용자 정의 훅 트리거</text>

  <line x1="550" y1="700" x2="550" y2="730" class="arrow"/>

  <!-- Return -->
  <rect x="400" y="730" width="300" height="50" class="step" rx="5"/>
  <text x="550" y="760" class="step-text" text-anchor="middle">tool_result → query.ts 반환</text>

  <line x1="550" y1="780" x2="550" y2="810" class="arrow"/>

  <!-- Next turn -->
  <rect x="400" y="810" width="300" height="50" class="step" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="550" y="840" class="step-text" text-anchor="middle" fill="#16a34a">메시지에 추가 → 다음 턴</text>

</svg>
