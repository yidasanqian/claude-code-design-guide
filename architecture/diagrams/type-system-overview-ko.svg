  <text x="50" y="560" font-family="Arial,sans-serif" font-size="11" fill="#666">태스크: 7가지 타입, 5가지 상태</text>

  <text x="450" y="480" font-family="Arial,sans-serif" font-size="11" fill="#666">훅: HookCommand + HookMatcher</text>
  <text x="450" y="500" font-family="Arial,sans-serif" font-size="11" fill="#666">생성됨: SessionEvent, ToolUseEvent,</text>
  <text x="450" y="520" font-family="Arial,sans-serif" font-size="11" fill="#666">PermissionEvent, ErrorEvent 등</text>
