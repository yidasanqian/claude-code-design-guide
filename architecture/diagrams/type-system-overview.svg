<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <rect x="300" y="20" width="200" height="50" fill="#dbeafe" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="400" y="45" font-family="Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle" font-weight="bold">types/</text>

  <rect x="50" y="120" width="150" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="125" y="145" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">Message union</text>

  <rect x="220" y="120" width="150" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="295" y="145" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">Permission types</text>

  <rect x="390" y="120" width="150" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="465" y="145" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">Command types</text>

  <rect x="560" y="120" width="150" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="635" y="145" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">Tool types</text>

  <rect x="50" y="200" width="150" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="125" y="225" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">Task types</text>

  <rect x="220" y="200" width="150" height="40" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="295" y="225" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">Hook types</text>

  <rect x="390" y="200" width="320" height="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="550" y="225" font-family="Arial,sans-serif" font-size="12" fill="#78350f" text-anchor="middle">generated/ (Protobuf compiled)</text>

  <rect x="400" y="280" width="300" height="40" fill="#f0f4f8" stroke="#f59e0b" stroke-width="1" rx="5"/>
  <text x="550" y="305" font-family="Arial,sans-serif" font-size="11" fill="#78350f" text-anchor="middle">events_mono/claude_code/v1</text>

  <rect x="400" y="330" width="300" height="40" fill="#f0f4f8" stroke="#f59e0b" stroke-width="1" rx="5"/>
  <text x="550" y="355" font-family="Arial,sans-serif" font-size="11" fill="#78350f" text-anchor="middle">events_mono/common/v1</text>

  <rect x="400" y="380" width="300" height="40" fill="#f0f4f8" stroke="#f59e0b" stroke-width="1" rx="5"/>
  <text x="550" y="405" font-family="Arial,sans-serif" font-size="11" fill="#78350f" text-anchor="middle">events_mono/growthbook/v1</text>

  <line x1="400" y1="70" x2="125" y2="120" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="70" x2="295" y2="120" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="70" x2="465" y2="120" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="70" x2="635" y2="120" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="70" x2="125" y2="200" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="70" x2="295" y2="200" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="550" y1="240" x2="550" y2="280" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="550" y1="320" x2="550" y2="330" stroke="#666" stroke-width="1"/>
  <line x1="550" y1="370" x2="550" y2="380" stroke="#666" stroke-width="1"/>

  <text x="50" y="480" font-family="Arial,sans-serif" font-size="11" fill="#666">Message: 10 variants</text>
  <text x="50" y="500" font-family="Arial,sans-serif" font-size="11" fill="#666">Permission: modes + rules + updates</text>
  <text x="50" y="520" font-family="Arial,sans-serif" font-size="11" fill="#666">Command: PromptCommand + LocalCommand</text>
  <text x="50" y="540" font-family="Arial,sans-serif" font-size="11" fill="#666">Tool: Tool interface + ToolUseContext (40+ props)</text>
  <text x="50" y="560" font-family="Arial,sans-serif" font-size="11" fill="#666">Task: 7 types, 5 statuses</text>

  <text x="450" y="480" font-family="Arial,sans-serif" font-size="11" fill="#666">Hook: HookCommand + HookMatcher</text>
  <text x="450" y="500" font-family="Arial,sans-serif" font-size="11" fill="#666">Generated: SessionEvent, ToolUseEvent,</text>
  <text x="450" y="520" font-family="Arial,sans-serif" font-size="11" fill="#666">PermissionEvent, ErrorEvent, etc.</text>
</svg>
