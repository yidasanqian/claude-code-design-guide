<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" width="640" height="480">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="320" y="28" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#1e40af" text-anchor="middle">UI 컴포넌트 트리</text>

  <!-- App -->
  <rect x="240" y="44" width="160" height="38" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="58" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">&lt;App&gt;</text>
  <text x="320" y="74" font-family="Arial,sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">src/ink/components/App.tsx</text>

  <!-- Vertical line from App to REPL -->
  <line x1="320" y1="82" x2="320" y2="102" stroke="#666" stroke-width="1.5"/>

  <!-- REPL -->
  <rect x="220" y="104" width="200" height="38" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="118" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">&lt;REPL&gt;</text>
  <text x="320" y="134" font-family="Arial,sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">src/components/REPL.tsx</text>

  <!-- Vertical line from REPL down -->
  <line x1="320" y1="142" x2="320" y2="162" stroke="#666" stroke-width="1.5"/>
  <!-- Horizontal branch line -->
  <line x1="60" y1="162" x2="580" y2="162" stroke="#666" stroke-width="1.5"/>

  <!-- Branch verticals -->
  <line x1="60" y1="162" x2="60" y2="182" stroke="#666" stroke-width="1.5"/>
  <line x1="180" y1="162" x2="180" y2="182" stroke="#666" stroke-width="1.5"/>
  <line x1="320" y1="162" x2="320" y2="182" stroke="#666" stroke-width="1.5"/>
  <line x1="450" y1="162" x2="450" y2="182" stroke="#666" stroke-width="1.5"/>
  <line x1="580" y1="162" x2="580" y2="182" stroke="#666" stroke-width="1.5"/>

  <!-- PromptInput -->
  <rect x="10" y="182" width="100" height="38" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="60" y="197" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle" font-weight="bold">&lt;PromptInput&gt;</text>
  <text x="60" y="211" font-family="Arial,sans-serif" font-size="9" fill="#1e40af" text-anchor="middle">사용자 입력 영역</text>

  <!-- Messages -->
  <rect x="120" y="182" width="120" height="38" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="180" y="197" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle" font-weight="bold">&lt;Messages&gt;</text>
  <text x="180" y="211" font-family="Arial,sans-serif" font-size="9" fill="#1e40af" text-anchor="middle">메시지 렌더링</text>

  <!-- Permissions -->
  <rect x="255" y="182" width="130" height="38" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="197" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle" font-weight="bold">&lt;Permissions&gt;</text>
  <text x="320" y="211" font-family="Arial,sans-serif" font-size="9" fill="#1e40af" text-anchor="middle">권한 다이얼로그</text>

  <!-- Tasks -->
  <rect x="400" y="182" width="100" height="38" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="197" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle" font-weight="bold">&lt;Tasks&gt;</text>
  <text x="450" y="211" font-family="Arial,sans-serif" font-size="9" fill="#1e40af" text-anchor="middle">백그라운드 태스크</text>

  <!-- Diff + Spinner -->
  <rect x="510" y="182" width="120" height="38" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="570" y="197" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle" font-weight="bold">&lt;Diff&gt; &amp; &lt;Spinner&gt;</text>
  <text x="570" y="211" font-family="Arial,sans-serif" font-size="9" fill="#1e40af" text-anchor="middle">diff / 로딩</text>

  <!-- Messages children -->
  <line x1="180" y1="220" x2="180" y2="244" stroke="#666" stroke-width="1.5"/>
  <line x1="110" y1="244" x2="250" y2="244" stroke="#666" stroke-width="1.5"/>

  <line x1="110" y1="244" x2="110" y2="260" stroke="#666" stroke-width="1.5"/>
  <line x1="140" y1="244" x2="140" y2="260" stroke="#666" stroke-width="1.5"/>
  <line x1="175" y1="244" x2="175" y2="260" stroke="#666" stroke-width="1.5"/>
  <line x1="210" y1="244" x2="210" y2="260" stroke="#666" stroke-width="1.5"/>
  <line x1="250" y1="244" x2="250" y2="260" stroke="#666" stroke-width="1.5"/>

  <!-- AssistantMessage -->
  <rect x="56" y="260" width="108" height="34" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="110" y="275" font-family="Arial,sans-serif" font-size="10" fill="#1e40af" text-anchor="middle" font-weight="bold">&lt;AssistantMessage&gt;</text>
  <text x="110" y="288" font-family="Arial,sans-serif" font-size="9" fill="#1e40af" text-anchor="middle">텍스트 / 도구 / 사고</text>

  <!-- UserMessage -->
  <rect x="80" y="260" width="120" height="34" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="140" y="275" font-family="Arial,sans-serif" font-size="10" fill="#1e40af" text-anchor="middle" font-weight="bold">&lt;UserMessage&gt;</text>
  <text x="140" y="288" font-family="Arial,sans-serif" font-size="9" fill="#1e40af" text-anchor="middle">텍스트 / bash / 결과</text>

  <!-- SystemMessage -->
  <rect x="118" y="260" width="114" height="34" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="175" y="275" font-family="Arial,sans-serif" font-size="10" fill="#1e40af" text-anchor="middle" font-weight="bold">&lt;SystemMessage&gt;</text>
  <text x="175" y="288" font-family="Arial,sans-serif" font-size="9" fill="#1e40af" text-anchor="middle">시스템 메시지</text>

  <!-- HookProgress -->
  <rect x="155" y="260" width="110" height="34" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="210" y="275" font-family="Arial,sans-serif" font-size="10" fill="#1e40af" text-anchor="middle" font-weight="bold">&lt;HookProgress&gt;</text>
  <text x="210" y="288" font-family="Arial,sans-serif" font-size="9" fill="#1e40af" text-anchor="middle">훅 실행</text>

  <!-- PlanApproval -->
  <rect x="196" y="260" width="108" height="34" rx="5" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="250" y="275" font-family="Arial,sans-serif" font-size="10" fill="#1e40af" text-anchor="middle" font-weight="bold">&lt;PlanApproval&gt;</text>
  <text x="250" y="288" font-family="Arial,sans-serif" font-size="9" fill="#1e40af" text-anchor="middle">플랜 모드 승인</text>

  <!-- Legend -->
  <rect x="10" y="350" width="620" height="1" fill="#e2e8f0"/>
  <text x="20" y="375" font-family="Arial,sans-serif" font-size="11" fill="#64748b">참고: &lt;Messages&gt;의 자식에는 AssistantMessage, UserMessage, SystemMessage, HookProgress, PlanApproval이 포함됨</text>
  <text x="20" y="394" font-family="Arial,sans-serif" font-size="11" fill="#64748b">각 자식은 서로 다른 콘텐츠 타입에 대한 자체 렌더링 로직을 처리함.</text>
</svg>
