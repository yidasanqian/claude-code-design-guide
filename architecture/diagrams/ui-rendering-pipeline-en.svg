<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 620" width="520" height="620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="260" y="30" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#1e40af" text-anchor="middle">UI Rendering Pipeline</text>

  <!-- Step 1: React Component Tree -->
  <rect x="110" y="50" width="300" height="44" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="260" y="67" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">React Component Tree</text>
  <text x="260" y="84" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">(JSX elements)</text>

  <!-- Arrow -->
  <line x1="260" y1="94" x2="260" y2="118" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Reconciler -->
  <rect x="110" y="120" width="300" height="44" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="260" y="137" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">Reconciler</text>
  <text x="260" y="154" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">(reconciler.ts — React Fiber)</text>

  <!-- Arrow -->
  <line x1="260" y1="164" x2="260" y2="188" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: DOM Node Tree -->
  <rect x="110" y="190" width="300" height="44" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="260" y="207" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">DOM Node Tree</text>
  <text x="260" y="224" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">(dom.ts — custom nodes)</text>

  <!-- Arrow -->
  <line x1="260" y1="234" x2="260" y2="258" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Yoga Layout -->
  <rect x="110" y="260" width="300" height="44" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="260" y="277" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">Yoga Layout Calculation</text>
  <text x="260" y="294" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">(layout/ — Flexbox engine)</text>

  <!-- Arrow -->
  <line x1="260" y1="304" x2="260" y2="328" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: Node Rendering -->
  <rect x="110" y="330" width="300" height="44" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="260" y="347" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">Node Rendering + Border</text>
  <text x="260" y="364" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">(render-node-to-output.ts / render-border.ts)</text>

  <!-- Arrow -->
  <line x1="260" y1="374" x2="260" y2="398" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 6: Screen Buffer -->
  <rect x="110" y="400" width="300" height="44" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="260" y="417" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">Screen Buffer (CharPool)</text>
  <text x="260" y="434" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">(screen.ts — Int32Array cells)</text>

  <!-- Arrow -->
  <line x1="260" y1="444" x2="260" y2="468" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 7: Differential Output -->
  <rect x="110" y="470" width="300" height="44" rx="5" fill="#f0f4f8" stroke="#2563eb" stroke-width="2"/>
  <text x="260" y="487" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">Differential Output</text>
  <text x="260" y="504" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">(output.ts — diff changed lines)</text>

  <!-- Arrow -->
  <line x1="260" y1="514" x2="260" y2="538" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 8: Terminal Write -->
  <rect x="110" y="540" width="300" height="44" rx="5" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="260" y="557" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">Terminal Write</text>
  <text x="260" y="574" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">(render-to-screen.ts — ANSI escape sequences)</text>
</svg>
