<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
  </defs>

  <text x="300" y="30" font-family="Arial,sans-serif" font-size="16" fill="#1e40af" text-anchor="middle" font-weight="bold">연산자 + 모션 = 명령어</text>

  <!-- Example 1 -->
  <rect x="50" y="60" width="100" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="100" y="90" font-family="Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle">d</text>

  <text x="170" y="90" font-family="Arial,sans-serif" font-size="18" fill="#666" text-anchor="middle">+</text>

  <rect x="200" y="60" width="100" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="250" y="90" font-family="Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle">w</text>

  <text x="320" y="90" font-family="Arial,sans-serif" font-size="18" fill="#666" text-anchor="middle">=</text>

  <rect x="350" y="60" width="200" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="450" y="90" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">dw (단어 삭제)</text>

  <!-- Example 2 -->
  <rect x="50" y="130" width="100" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="100" y="160" font-family="Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle">c</text>

  <text x="170" y="160" font-family="Arial,sans-serif" font-size="18" fill="#666" text-anchor="middle">+</text>

  <rect x="200" y="130" width="100" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="250" y="160" font-family="Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle">$</text>

  <text x="320" y="160" font-family="Arial,sans-serif" font-size="18" fill="#666" text-anchor="middle">=</text>

  <rect x="350" y="130" width="200" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="450" y="160" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">c$ (줄 끝까지 변경)</text>

  <!-- Example 3 -->
  <rect x="50" y="200" width="100" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="100" y="230" font-family="Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle">y</text>

  <text x="170" y="230" font-family="Arial,sans-serif" font-size="18" fill="#666" text-anchor="middle">+</text>

  <rect x="200" y="200" width="100" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="250" y="230" font-family="Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle">gg</text>

  <text x="320" y="230" font-family="Arial,sans-serif" font-size="18" fill="#666" text-anchor="middle">=</text>

  <rect x="350" y="200" width="200" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="450" y="230" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">ygg (파일 처음까지 복사)</text>

  <!-- Example 4 -->
  <rect x="50" y="270" width="100" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="100" y="300" font-family="Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle">3</text>

  <text x="170" y="300" font-family="Arial,sans-serif" font-size="18" fill="#666" text-anchor="middle">+</text>

  <rect x="200" y="270" width="100" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="250" y="300" font-family="Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle">dw</text>

  <text x="320" y="300" font-family="Arial,sans-serif" font-size="18" fill="#666" text-anchor="middle">=</text>

  <rect x="350" y="270" width="200" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="450" y="300" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">3dw (단어 3개 삭제)</text>

  <!-- Example 5 -->
  <rect x="50" y="340" width="100" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="100" y="370" font-family="Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle">d</text>

  <text x="170" y="370" font-family="Arial,sans-serif" font-size="18" fill="#666" text-anchor="middle">+</text>

  <rect x="200" y="340" width="100" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="250" y="370" font-family="Arial,sans-serif" font-size="14" fill="#1e40af" text-anchor="middle">f)</text>

  <text x="320" y="370" font-family="Arial,sans-serif" font-size="18" fill="#666" text-anchor="middle">=</text>

  <rect x="350" y="340" width="200" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" rx="5"/>
  <text x="450" y="370" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle">df) (오른쪽 괄호까지 삭제)</text>
</svg>
