<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666" />
    </marker>
  </defs>

  <text x="300" y="30" font-family="Arial,sans-serif" font-size="16" fill="#1e40af" text-anchor="middle" font-weight="bold">Gate Decision Flow</text>

  <!-- Start -->
  <rect x="200" y="60" width="200" height="50" fill="#f0f4f8" stroke="#2563eb" stroke-width="2" rx="5"/>
  <text x="300" y="90" font-family="Arial,sans-serif" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="bold">isVoiceModeEnabled()</text>

  <path d="M 300 110 L 300 150" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- hasVoiceAuth check -->
  <path d="M 300 150 L 300 180" stroke="#666" stroke-width="2" fill="none"/>
  <polygon points="300,150 350,180 300,210 250,180" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="300" y="185" font-family="Arial,sans-serif" font-size="12" fill="#1e40af" text-anchor="middle">hasVoiceAuth()?</text>

  <!-- No path -->
  <path d="M 250 180 L 100 180 L 100 250" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="150" y="175" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">No</text>

  <rect x="30" y="250" width="140" height="50" fill="#fee" stroke="#f00" stroke-width="2" rx="5"/>
  <text x="100" y="280" font-family="Arial,sans-serif" font-size="12" fill="#c00" text-anchor="middle">return false</text>

  <!-- Yes path -->
  <path d="M 350 180 L 450 180 L 450 250" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="410" y="175" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">Yes</text>

  <!-- isVoiceGrowthBookEnabled check -->
  <polygon points="450,250 500,280 450,310 400,280" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="275" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">isVoiceGrowthBook</text>
  <text x="450" y="290" font-family="Arial,sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">Enabled()?</text>

  <!-- No path from GrowthBook -->
  <path d="M 400 280 L 250 280 L 250 350" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="310" y="275" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">No</text>

  <rect x="180" y="350" width="140" height="50" fill="#fee" stroke="#f00" stroke-width="2" rx="5"/>
  <text x="250" y="380" font-family="Arial,sans-serif" font-size="12" fill="#c00" text-anchor="middle">return false</text>

  <!-- Yes path from GrowthBook -->
  <path d="M 500 280 L 550 280 L 550 380 L 450 380 L 450 420" stroke="#666" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="530" y="275" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">Yes</text>

  <rect x="380" y="420" width="140" height="50" fill="#efe" stroke="#0a0" stroke-width="2" rx="5"/>
  <text x="450" y="450" font-family="Arial,sans-serif" font-size="12" fill="#0a0" text-anchor="middle" font-weight="bold">return true ✓</text>

  <!-- Result note -->
  <text x="300" y="440" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">Result: auth AND gate both satisfied</text>
</svg>
