<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="840" height="540" viewBox="0 0 840 540">
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#d97706"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#059669"/>
    </marker>
  </defs>
  <rect width="840" height="540" fill="white"/>

  <!-- Title -->
  <text x="420" y="34" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="bold" fill="#1e40af" text-anchor="middle" dominant-baseline="middle">자동 컴팩트(Auto-Compact) 압축 흐름</text>

  <!-- Original message list -->
  <rect x="40" y="58" width="380" height="130" rx="10" fill="#ffc9c9" stroke="#dc2626" stroke-width="2"/>
  <text x="230" y="82" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="600" fill="#dc2626" text-anchor="middle" dominant-baseline="middle">원본 메시지 목록 (255K 토큰)</text>
  <text x="230" y="110" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#374151" text-anchor="middle" dominant-baseline="middle">시스템 프롬프트 + 50회 대화 턴 +</text>
  <text x="230" y="130" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#374151" text-anchor="middle" dominant-baseline="middle">대용량 도구 호출 결과</text>
  <text x="230" y="165" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#dc2626" text-anchor="middle" dominant-baseline="middle">▲ 85% 임계값 초과, 컴팩트 트리거</text>

  <!-- Threshold box -->
  <rect x="470" y="58" width="330" height="130" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="635" y="90" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="600" fill="#374151" text-anchor="middle" dominant-baseline="middle">트리거 임계값</text>
  <text x="635" y="122" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" fill="#d97706" text-anchor="middle" dominant-baseline="middle">85% → 경고 표시</text>
  <text x="635" y="150" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" fill="#dc2626" text-anchor="middle" dominant-baseline="middle">95% → 강제 컴팩트</text>

  <!-- Arrow down -->
  <line x1="230" y1="190" x2="230" y2="218" stroke="#d97706" stroke-width="2.5" marker-end="url(#arr-orange)"/>

  <!-- To compress -->
  <rect x="40" y="222" width="170" height="80" rx="8" fill="#ffd8a8" stroke="#d97706" stroke-width="2"/>
  <text x="125" y="252" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#92400e" text-anchor="middle" dominant-baseline="middle">압축 대상</text>
  <text x="125" y="276" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#92400e" text-anchor="middle" dominant-baseline="middle">(200K 토큰)</text>

  <!-- Keep -->
  <rect x="250" y="222" width="170" height="80" rx="8" fill="#c3fae8" stroke="#059669" stroke-width="2"/>
  <text x="335" y="252" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#065f46" text-anchor="middle" dominant-baseline="middle">최근 메시지 유지</text>
  <text x="335" y="276" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#065f46" text-anchor="middle" dominant-baseline="middle">(마지막 10개)</text>

  <!-- Arrow compress → summary -->
  <line x1="125" y1="304" x2="125" y2="372" stroke="#d97706" stroke-width="2.5" marker-end="url(#arr-orange)"/>

  <!-- Claude generates summary -->
  <rect x="40" y="374" width="170" height="60" rx="8" fill="#d0bfff" stroke="#9333ea" stroke-width="2"/>
  <text x="125" y="394" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600" fill="#6b21a8" text-anchor="middle" dominant-baseline="middle">Claude 요약 생성</text>
  <text x="125" y="414" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#6b21a8" text-anchor="middle" dominant-baseline="middle">(10K 토큰)</text>

  <!-- Arrows to result -->
  <line x1="125" y1="436" x2="340" y2="460" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="335" y1="304" x2="380" y2="460" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Result -->
  <rect x="280" y="462" width="340" height="46" rx="10" fill="#b2f2bb" stroke="#059669" stroke-width="2.5"/>
  <text x="450" y="485" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="600" fill="#065f46" text-anchor="middle" dominant-baseline="middle">압축된 메시지 목록 (60K 토큰) ✓</text>
</svg>
