<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720">
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#059669"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#d97706"/>
    </marker>
    <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="1000" height="720" fill="white"/>

  <!-- Title -->
  <text x="500" y="34" font-family="'Segoe UI',system-ui,sans-serif" font-size="24" font-weight="bold" fill="#1e40af" text-anchor="middle" dominant-baseline="middle">Claude Code 핵심 아키텍처</text>

  <!-- User layer -->
  <rect x="350" y="62" width="300" height="60" rx="10" fill="#a5d8ff" stroke="#1e40af" stroke-width="2.5"/>
  <text x="500" y="81" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="600" fill="#1e40af" text-anchor="middle" dominant-baseline="middle">사용자 계층</text>
  <text x="500" y="103" font-family="'Segoe UI',system-ui,sans-serif" font-size="15" font-weight="600" fill="#1e40af" text-anchor="middle" dominant-baseline="middle">CLI / Desktop / Web</text>

  <!-- Arrow user → QueryEngine -->
  <line x1="500" y1="124" x2="500" y2="160" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr-blue)"/>

  <!-- QueryEngine -->
  <rect x="300" y="162" width="400" height="70" rx="10" fill="#dbe4ff" stroke="#3730a3" stroke-width="2.5"/>
  <text x="500" y="187" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="600" fill="#3730a3" text-anchor="middle" dominant-baseline="middle">쿼리 엔진(QueryEngine) (핵심 엔진)</text>
  <text x="500" y="208" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" font-weight="600" fill="#3730a3" text-anchor="middle" dominant-baseline="middle">메시지 루프 · 에이전트 실행 · 스트리밍 응답</text>

  <!-- Arrows QueryEngine → 3 boxes -->
  <line x1="350" y1="233" x2="150" y2="288" stroke="#059669" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="500" y1="233" x2="500" y2="288" stroke="#d97706" stroke-width="2.5" marker-end="url(#arr-orange)"/>
  <line x1="650" y1="233" x2="850" y2="288" stroke="#9333ea" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- Tool system -->
  <rect x="40" y="292" width="220" height="180" rx="10" fill="#d3f9d8" stroke="#059669" stroke-width="2"/>
  <text x="150" y="318" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="600" fill="#065f46" text-anchor="middle" dominant-baseline="middle">도구 시스템</text>
  <rect x="58" y="340" width="184" height="22" rx="5" fill="#b2f2bb" stroke="#059669" stroke-width="1.5"/>
  <text x="150" y="351" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#374151" text-anchor="middle" dominant-baseline="middle">FileReadTool</text>
  <rect x="58" y="366" width="184" height="22" rx="5" fill="#b2f2bb" stroke="#059669" stroke-width="1.5"/>
  <text x="150" y="377" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#374151" text-anchor="middle" dominant-baseline="middle">FileEditTool</text>
  <rect x="58" y="392" width="184" height="22" rx="5" fill="#b2f2bb" stroke="#059669" stroke-width="1.5"/>
  <text x="150" y="403" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#374151" text-anchor="middle" dominant-baseline="middle">BashTool</text>
  <rect x="58" y="418" width="184" height="22" rx="5" fill="#b2f2bb" stroke="#059669" stroke-width="1.5"/>
  <text x="150" y="429" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#374151" text-anchor="middle" dominant-baseline="middle">GrepTool</text>
  <rect x="58" y="444" width="184" height="22" rx="5" fill="#b2f2bb" stroke="#059669" stroke-width="1.5"/>
  <text x="150" y="455" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#374151" text-anchor="middle" dominant-baseline="middle">AgentTool</text>

  <!-- Permission system -->
  <rect x="290" y="292" width="420" height="180" rx="10" fill="#fff3bf" stroke="#d97706" stroke-width="2"/>
  <text x="500" y="318" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="600" fill="#92400e" text-anchor="middle" dominant-baseline="middle">권한 시스템 (5계층 아키텍처)</text>
  <text x="500" y="345" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#374151" text-anchor="middle" dominant-baseline="middle">① 세션 모드 (default/acceptEdits/bypass)</text>
  <text x="500" y="369" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#374151" text-anchor="middle" dominant-baseline="middle">② 도구 화이트리스트/블랙리스트</text>
  <text x="500" y="393" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#374151" text-anchor="middle" dominant-baseline="middle">③ 도구 수준 권한 (read/edit/bash)</text>
  <text x="500" y="417" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#374151" text-anchor="middle" dominant-baseline="middle">④ 작업 수준 권한 (ls vs rm -rf)</text>
  <text x="500" y="441" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#374151" text-anchor="middle" dominant-baseline="middle">⑤ 경로/명령어 수준 권한</text>

  <!-- MCP client -->
  <rect x="740" y="292" width="220" height="180" rx="10" fill="#e5dbff" stroke="#9333ea" stroke-width="2"/>
  <text x="850" y="318" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="600" fill="#6b21a8" text-anchor="middle" dominant-baseline="middle">MCP 클라이언트</text>
  <rect x="758" y="340" width="184" height="26" rx="5" fill="#d0bfff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="850" y="353" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#374151" text-anchor="middle" dominant-baseline="middle">GitHub MCP</text>
  <rect x="758" y="372" width="184" height="26" rx="5" fill="#d0bfff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="850" y="385" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#374151" text-anchor="middle" dominant-baseline="middle">Slack MCP</text>
  <rect x="758" y="404" width="184" height="26" rx="5" fill="#d0bfff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="850" y="417" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#374151" text-anchor="middle" dominant-baseline="middle">Database MCP</text>
  <rect x="758" y="436" width="184" height="26" rx="5" fill="#d0bfff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="850" y="449" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#374151" text-anchor="middle" dominant-baseline="middle">Custom MCP</text>

  <!-- Arrows to bottom row -->
  <line x1="200" y1="474" x2="200" y2="520" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <line x1="500" y1="474" x2="500" y2="520" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <line x1="800" y1="474" x2="800" y2="520" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr-blue)"/>

  <!-- State management -->
  <rect x="40" y="522" width="440" height="160" rx="10" fill="#c3fae8" stroke="#059669" stroke-width="2"/>
  <text x="260" y="548" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="600" fill="#065f46" text-anchor="middle" dominant-baseline="middle">상태 관리</text>
  <rect x="58" y="568" width="200" height="50" rx="6" fill="#b2f2bb" stroke="#059669" stroke-width="1.5"/>
  <text x="158" y="584" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#374151" text-anchor="middle" dominant-baseline="middle">부트스트랩 상태(Bootstrap State)</text>
  <text x="158" y="602" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#374151" text-anchor="middle" dominant-baseline="middle">글로벌 싱글턴 · 프로세스 수준</text>
  <rect x="270" y="568" width="192" height="50" rx="6" fill="#b2f2bb" stroke="#059669" stroke-width="1.5"/>
  <text x="366" y="584" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#374151" text-anchor="middle" dominant-baseline="middle">AppState</text>
  <text x="366" y="602" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#374151" text-anchor="middle" dominant-baseline="middle">세션 수준 · 리액티브</text>
  <text x="260" y="645" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#374151" text-anchor="middle" dominant-baseline="middle">messages[] · tasks · permissions · fileHistory</text>

  <!-- Context engineering -->
  <rect x="520" y="522" width="440" height="160" rx="10" fill="#ffd8a8" stroke="#d97706" stroke-width="2"/>
  <text x="740" y="548" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="600" fill="#92400e" text-anchor="middle" dominant-baseline="middle">컨텍스트 엔지니어링</text>
  <rect x="538" y="572" width="404" height="22" rx="5" fill="#ffc9c9" stroke="#dc2626" stroke-width="1.5"/>
  <text x="740" y="583" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#374151" text-anchor="middle" dominant-baseline="middle">시스템 프롬프트 구축 (도구 정의 + 핵심 지침)</text>
  <rect x="538" y="598" width="404" height="22" rx="5" fill="#ffc9c9" stroke="#dc2626" stroke-width="1.5"/>
  <text x="740" y="609" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#374151" text-anchor="middle" dominant-baseline="middle">메모리 시스템 (사용자/피드백/프로젝트)</text>
  <rect x="538" y="624" width="404" height="22" rx="5" fill="#ffc9c9" stroke="#dc2626" stroke-width="1.5"/>
  <text x="740" y="635" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#374151" text-anchor="middle" dominant-baseline="middle">CLAUDE.md (프로젝트 컨텍스트)</text>
  <rect x="538" y="650" width="404" height="22" rx="5" fill="#ffc9c9" stroke="#dc2626" stroke-width="1.5"/>
  <text x="740" y="661" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#374151" text-anchor="middle" dominant-baseline="middle">자동 컴팩트(Auto-Compact) (컨텍스트 압축)</text>
</svg>
