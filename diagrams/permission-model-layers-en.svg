  <rect width="900" height="650" fill="white"/>
  <text x="450" y="34"
         font-family="'Segoe UI',system-ui,sans-serif"
         font-size="22" font-weight="bold"
         fill="#1e40af" text-anchor="middle"
         dominant-baseline="middle">Five-Layer Permission Architecture</text>
  <rect x="40" y="62" width="820" height="88" rx="10"
       fill="#a5d8ff" stroke="#1e40af" stroke-width="2.5" />
  <text x="450" y="90"
         font-family="'Segoe UI',system-ui,sans-serif"
         font-size="17" font-weight="600"
         fill="#1e40af" text-anchor="middle"
         dominant-baseline="middle">Layer 1: Session Mode</text>
  <text x="450" y="122"
         font-family="'Segoe UI',system-ui,sans-serif"
         font-size="13" font-weight="normal"
         fill="#374151" text-anchor="middle"
         dominant-baseline="middle">default / acceptEdits / bypassPermissions / plan  —  Sets overall permission baseline</text>
  <path d="M450,152 Q451.1350535270978,158.5 450,165"
       fill="none" stroke="#3b82f6" stroke-width="2.5" 
       marker-end="url(#arr-3b82f6)" />
  <rect x="80" y="170" width="740" height="88" rx="10"
       fill="#b2f2bb" stroke="#059669" stroke-width="2.5" />
  <text x="450" y="198"
         font-family="'Segoe UI',system-ui,sans-serif"
         font-size="17" font-weight="600"
         fill="#059669" text-anchor="middle"
         dominant-baseline="middle">Layer 2: Tool Whitelist / Blacklist</text>
  <text x="450" y="230"
         font-family="'Segoe UI',system-ui,sans-serif"
         font-size="13" font-weight="normal"
         fill="#374151" text-anchor="middle"
         dominant-baseline="middle">allowedTools: [FileReadTool...]   deniedTools: [BashTool...]  —  Determines which tools are available</text>
  <path d="M450,260 Q450.98224196141837,266.5 450,273"
       fill="none" stroke="#3b82f6" stroke-width="2.5" 
       marker-end="url(#arr-3b82f6)" />
  <rect x="120" y="278" width="660" height="88" rx="10"
       fill="#d0bfff" stroke="#9333ea" stroke-width="2.5" />
  <text x="450" y="306"
         font-family="'Segoe UI',system-ui,sans-serif"
         font-size="17" font-weight="600"
         fill="#9333ea" text-anchor="middle"
         dominant-baseline="middle">Layer 3: Tool-Level Permissions</text>
  <text x="450" y="338"
         font-family="'Segoe UI',system-ui,sans-serif"
         font-size="13" font-weight="normal"
         fill="#374151" text-anchor="middle"
         dominant-baseline="middle">FileReadTool → auto-allow    FileEditTool → ask    BashTool → ask</text>
  <path d="M450,368 Q449.5305009326711,374.5 450,381"
       fill="none" stroke="#3b82f6" stroke-width="2.5" 
       marker-end="url(#arr-3b82f6)" />
  <rect x="160" y="386" width="580" height="88" rx="10"
       fill="#ffd8a8" stroke="#d97706" stroke-width="2.5" />
  <text x="450" y="414"
         font-family="'Segoe UI',system-ui,sans-serif"
         font-size="17" font-weight="600"
         fill="#d97706" text-anchor="middle"
         dominant-baseline="middle">Layer 4: Operation-Level Permissions</text>
  <text x="450" y="446"
         font-family="'Segoe UI',system-ui,sans-serif"
         font-size="13" font-weight="normal"
         fill="#374151" text-anchor="middle"
         dominant-baseline="middle">"ls" → low risk    "rm -rf" → high risk requires confirmation  —  Different ops within same tool</text>
  <path d="M450,476 Q450.1768809938575,482.5 450,489"
       fill="none" stroke="#3b82f6" stroke-width="2.5" 
       marker-end="url(#arr-3b82f6)" />
  <rect x="200" y="494" width="500" height="88" rx="10"
       fill="#ffc9c9" stroke="#dc2626" stroke-width="2.5" />
  <text x="450" y="522"
         font-family="'Segoe UI',system-ui,sans-serif"
         font-size="17" font-weight="600"
         fill="#dc2626" text-anchor="middle"
         dominant-baseline="middle">Layer 5: Path / Command-Level Permissions</text>
  <text x="450" y="554"
         font-family="'Segoe UI',system-ui,sans-serif"
         font-size="13" font-weight="normal"
         fill="#374151" text-anchor="middle"
         dominant-baseline="middle">allowedWritePaths   deniedWritePaths   allowedBashCommands  —  Finest granularity</text>
  <text x="450" y="614"
         font-family="'Segoe UI',system-ui,sans-serif"
         font-size="15" font-weight="normal"
         fill="#6b7280" text-anchor="middle"
         dominant-baseline="middle">Security is default, convenience is optional, control is in user's hands</text>
</svg>