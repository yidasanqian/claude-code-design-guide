<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="740" height="770" viewBox="0 0 740 770">
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="740" height="770" fill="white"/>

  <!-- Title -->
  <text x="370" y="34" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="bold" fill="#1e40af" text-anchor="middle" dominant-baseline="middle">쿼리 엔진 실행 흐름</text>

  <!-- Step 0 -->
  <rect x="110" y="58" width="520" height="60" rx="10" fill="#a5d8ff" stroke="#1e40af" stroke-width="2.5"/>
  <text x="370" y="88" font-family="'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="600" fill="#1e40af" text-anchor="middle" dominant-baseline="middle">submitMessage( userInput )</text>

  <!-- Arrow -->
  <line x1="370" y1="120" x2="370" y2="148" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr-blue)"/>

  <!-- Step 1 -->
  <rect x="110" y="150" width="520" height="75" rx="10" fill="#fff3bf" stroke="#92400e" stroke-width="2.5"/>
