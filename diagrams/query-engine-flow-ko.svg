  <text x="370" y="202" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#374151" text-anchor="middle" dominant-baseline="middle">슬래시 커맨드 파싱 · 첨부 처리 · 메모리 주입</text>

  <!-- Arrow -->
  <line x1="370" y1="227" x2="370" y2="255" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr-blue)"/>

  <!-- Step 2 -->
  <rect x="110" y="257" width="520" height="75" rx="10" fill="#c3fae8" stroke="#065f46" stroke-width="2.5"/>
  <text x="370" y="283" font-family="'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="600" fill="#065f46" text-anchor="middle" dominant-baseline="middle">② 메시지 목록 구성</text>
  <text x="370" y="309" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#374151" text-anchor="middle" dominant-baseline="middle">히스토리 메시지 · 새 사용자 메시지 · 시스템 컨텍스트</text>

  <!-- Arrow -->
  <line x1="370" y1="334" x2="370" y2="362" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr-blue)"/>

