  <rect x="110" y="364" width="520" height="120" rx="10" fill="#dbe4ff" stroke="#3730a3" stroke-width="2.5" stroke-dasharray="7,4"/>
  <text x="370" y="400" font-family="'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="600" fill="#3730a3" text-anchor="middle" dominant-baseline="middle">③ query() 핵심 루프 호출</text>
  <text x="370" y="432" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#374151" text-anchor="middle" dominant-baseline="middle">시스템 프롬프트 구성 → Claude API 호출 (스트리밍)</text>
  <text x="370" y="452" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#374151" text-anchor="middle" dominant-baseline="middle">응답 파싱 → 도구 호출 실행 → 완료까지 반복</text>

  <!-- Arrow -->
  <line x1="370" y1="486" x2="370" y2="514" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr-blue)"/>

