  <text x="370" y="542" font-family="'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="600" fill="#6b21a8" text-anchor="middle" dominant-baseline="middle">④ 후처리</text>
  <text x="370" y="568" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#374151" text-anchor="middle" dominant-baseline="middle">토큰 로깅 · 세션 저장 · 훅 실행 · 컴팩트 확인</text>

  <!-- Arrow -->
  <line x1="370" y1="593" x2="370" y2="621" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arr-blue)"/>

  <!-- Step 5 -->
  <rect x="110" y="623" width="520" height="60" rx="10" fill="#b2f2bb" stroke="#14532d" stroke-width="2.5"/>
  <text x="370" y="653" font-family="'Segoe UI',system-ui,sans-serif" font-size="17" font-weight="600" fill="#14532d" text-anchor="middle" dominant-baseline="middle">⑤ 호출자에게 결과 반환 (스트리밍)</text>
